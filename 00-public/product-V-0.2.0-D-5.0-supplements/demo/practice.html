<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1440, initial-scale=1" />
  <title>对练 practice · 睿学 NeoLearning</title>
  <link rel="icon" href="assets/logo.png" type="image/png" />
  <script>
    (function(){try{var s=localStorage.getItem('rx-theme')||'light';document.documentElement.setAttribute('data-theme',s);}catch(e){document.documentElement.setAttribute('data-theme','light');}})();
  </script>
  <script src="_shared/js/demo-reset.js?v=18"></script>
  <link rel="stylesheet" href="_shared/fonts/inter.css" />
  <link rel="stylesheet" href="_shared/css/tokens.css?v=14" />
  <link rel="stylesheet" href="_shared/css/topbar.css?v=15" />
  <style>
    /* === Tokens (复用 lecture / hall v11) === */
    :root, [data-theme="light"] {
      --bg-cream:#FAF7F2; --bg-card:#FFFFFF; --bg-card-solid:#FFFFFF;
      --glass-card:rgba(255,255,255,0.62); --bg-soft:#F5F1EA;
      --bg-glow-1:rgba(217,119,87,0.22); --bg-glow-2:rgba(184,95,56,0.16); --bg-glow-3:rgba(245,184,149,0.14);
      --ink-1:#1F1A17; --ink-2:#5C544E; --ink-3:#8E867F; --ink-4:#C4BCB4; --ink-5:#E5DFD7;
      --accent:#D97757; --accent-rgb:217,119,87; --accent-hover:#C8694B; --accent-soft:#F5E5DC;
      --accent-2:#B85F38; --accent-2-rgb:184,95,56;
      --grad-brand:linear-gradient(135deg,#D97757 0%,#B85F38 100%);
      --grad-cta:linear-gradient(135deg,#D97757 0%,#B85F38 100%);
      --drawer-bg:#FFFFFF;
      --error:#C0392B; --warn:#D89B3B; --success:#4F8B5C; --info:#4A7C9D;
      --hairline:rgba(31,26,23,0.08); --hairline-2:rgba(31,26,23,0.14); --hairline-top:rgba(255,255,255,0.85);
      --shadow-card:0 1px 2px rgba(31,26,23,0.04),0 4px 16px rgba(31,26,23,0.04);
      --shadow-pop:0 4px 12px rgba(31,26,23,0.06),0 16px 48px rgba(31,26,23,0.08);
      --inset-highlight:rgba(255,255,255,0.6);
      --glow-accent:0 0 24px rgba(var(--accent-rgb),0.18);
      --glow-accent-2:0 0 24px rgba(var(--accent-2-rgb),0.16);
    }
    [data-theme="dark"] {
      --bg-cream:#221C2D; --bg-card:#2B2438; --bg-card-solid:#2B2438;
      --glass-card:rgba(255,255,255,0.05); --bg-soft:#322940;
      --bg-glow-1:rgba(196,181,253,0.20); --bg-glow-2:rgba(139,92,246,0.16); --bg-glow-3:rgba(167,139,250,0.12);
      --ink-1:rgba(243,239,250,0.96); --ink-2:rgba(243,239,250,0.72); --ink-3:rgba(243,239,250,0.46);
      --ink-4:rgba(243,239,250,0.28); --ink-5:rgba(243,239,250,0.16);
      --accent:#C4B5FD; --accent-rgb:196,181,253; --accent-hover:#DDD6FE; --accent-soft:rgba(196,181,253,0.14);
      --accent-2:#A78BFA; --accent-2-rgb:167,139,250;
      --grad-brand:linear-gradient(135deg,#C4B5FD 0%,#A78BFA 100%);
      --grad-cta:linear-gradient(135deg,#A78BFA 0%,#7C3AED 100%);
      --drawer-bg:#2B2438;
      --error:#F87171; --warn:#FBBF24; --success:#34D399; --info:#60A5FA;
      --hairline:rgba(255,255,255,0.08); --hairline-2:rgba(255,255,255,0.14); --hairline-top:rgba(255,255,255,0.16);
      --shadow-card:0 8px 32px rgba(0,0,0,0.40);
      --shadow-pop:0 24px 60px rgba(0,0,0,0.55),0 0 0 1px rgba(0,0,0,0.30);
      --inset-highlight:rgba(255,255,255,0.06);
      --glow-accent:0 0 24px rgba(var(--accent-rgb),0.30);
      --glow-accent-2:0 0 24px rgba(var(--accent-2-rgb),0.24);
    }
    *{box-sizing:border-box;font-family:'Inter','PingFang SC',system-ui,-apple-system,sans-serif;}
    html,body{margin:0;padding:0;height:100%;}
    body{
      background:radial-gradient(ellipse 1100px 800px at 8% 6%,var(--bg-glow-1),transparent 55%),
        radial-gradient(ellipse 1000px 700px at 95% 90%,var(--bg-glow-2),transparent 55%),
        radial-gradient(ellipse 600px 400px at 50% 30%,var(--bg-glow-3),transparent 60%),var(--bg-cream);
      background-attachment:fixed; color:var(--ink-1);
      font-size:14px; line-height:1.5;
      min-width:1280px; overflow-x:auto; overflow-y:hidden;
    }
    .stage{display:grid;grid-template-rows:56px 1fr;height:100vh;width:100%;}
    .lecture-col{display:grid;grid-template-rows:56px 1fr;min-height:0;min-width:0;}
    /* === Topbar === */
    .topbar{display:grid;grid-template-columns:64px auto 1fr auto;align-items:center;background:transparent;border-bottom:1px solid var(--hairline);padding-right:16px;}
    .topbar-brand{display:flex;align-items:center;justify-content:center;padding:0 14px;cursor:pointer;}
    .port-chip{display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600;letter-spacing:0.02em;margin-left:8px;flex-shrink:0;border:1px solid currentColor;background:transparent;}
    .port-chip-learner{color:var(--accent);}
    .port-chip-admin{color:#10B981;}
    [data-theme="dark"] .port-chip-learner{color:var(--accent);}
    [data-theme="dark"] .port-chip-admin{color:#6EE7B7;}
    .topbar-brand img{width:28px;height:28px;object-fit:contain;filter:drop-shadow(0 0 12px rgba(var(--accent-rgb),0.25));}
    .topbar-project{display:flex;align-items:center;gap:10px;padding-left:8px;}
    .topbar-project-name{font-size:14px;font-weight:600;color:var(--ink-1);}
    .topbar-project-meta{font-size:12px;color:var(--ink-3);}
    .topbar-actions{display:flex;align-items:center;gap:4px;}
    /* === Subbar (复用 lecture · 加「重新演练 ▾」按钮) === */
    .subbar{display:grid;grid-template-columns:auto 1fr auto auto auto;align-items:center;gap:14px;padding:0 16px 0 8px;background:var(--bg-soft);border-bottom:1px solid var(--hairline);}
    .subbar-left{display:flex;align-items:center;gap:12px;min-width:0;}
    .subbar-drawer-btn{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;cursor:pointer;color:var(--ink-2);transition:all .15s ease;border:none;background:transparent;}
    .subbar-drawer-btn:hover{background:var(--bg-card);color:var(--ink-1);}
    .subbar-activity{font-size:13px;font-weight:600;color:var(--ink-1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .subbar-activity-meta{font-size:11px;color:var(--ink-3);margin-left:4px;}
    .subbar-timer{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--ink-2);font-feature-settings:'tnum';padding:4px 10px;background:var(--bg-card);border:1px solid var(--hairline);border-radius:999px;}
    .subbar-timer.paused{color:var(--ink-4);}
    .subbar-timer-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:timerPulse 1.6s ease-in-out infinite;}
    .subbar-timer.paused .subbar-timer-dot{background:var(--ink-4);animation:none;}
    @keyframes timerPulse{0%,100%{opacity:1;}50%{opacity:.35;}}
    .subbar-progress{display:flex;align-items:center;gap:10px;width:auto;}
    .subbar-progress-track{width:140px;height:6px;background:var(--ink-5);border-radius:3px;position:relative;overflow:hidden;}
    .subbar-progress-fill{position:absolute;left:0;top:0;bottom:0;width:0%;background:var(--accent);border-radius:3px;transition:width .3s ease;}
    .subbar-progress-current{position:absolute;top:-1px;bottom:-1px;width:2px;background:var(--accent-2);box-shadow:0 0 0 2px rgba(var(--accent-2-rgb),0.20);border-radius:1px;transition:left .3s ease;}
    .subbar-progress-label{font-size:11px;color:var(--ink-3);font-feature-settings:'tnum';white-space:nowrap;}
    .subbar-progress-label b{color:var(--ink-1);font-weight:600;}
    .subbar-mode-chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;background:rgba(167,139,250,0.20);border-radius:4px;font-size:10px;font-weight:600;color:#7C3AED;letter-spacing:.4px;}
    [data-theme="dark"] .subbar-mode-chip{color:var(--accent);}
    /* 「重新演练 ▾」按钮 + 下拉 */
    .replay-wrap{position:relative;display:none;}
    .replay-wrap.show{display:flex;align-items:center;}
    .replay-btn{display:inline-flex;align-items:center;gap:0;padding:0;background:var(--bg-card);border:1px solid var(--hairline-2);border-radius:8px;font-size:12px;color:var(--ink-1);overflow:hidden;}
    .replay-btn .replay-main,.replay-btn .replay-arrow{padding:6px 12px;cursor:pointer;transition:background .15s ease;}
    .replay-btn .replay-main{font-weight:500;border-right:1px solid var(--hairline);}
    .replay-btn .replay-main:hover,.replay-btn .replay-arrow:hover{background:var(--bg-soft);}
    .replay-btn.disabled{opacity:.45;cursor:not-allowed;}
    .replay-btn.disabled .replay-main,.replay-btn.disabled .replay-arrow{cursor:not-allowed;}
    .replay-btn.disabled .replay-main:hover,.replay-btn.disabled .replay-arrow:hover{background:transparent;}
    .replay-menu{position:absolute;top:calc(100% + 6px);right:0;background:var(--drawer-bg);border:1px solid var(--hairline-2);border-top-color:var(--hairline-top);border-radius:10px;box-shadow:var(--shadow-pop);z-index:130;display:none;min-width:230px;opacity:1;transform-origin:top right;}
    .replay-menu.open{display:block;}
    .replay-item{padding:9px 14px;font-size:12px;color:var(--ink-1);cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:10px;}
    .replay-item:hover{background:var(--bg-soft);}
    .replay-item.current{color:var(--accent);font-weight:500;}
    .replay-item-status{font-size:11px;color:var(--ink-3);}
    .replay-item-status.ok{color:var(--success);}
    .replay-item-status.warn{color:var(--warn);}
    /* === Main row === */
    .main-row{display:grid;grid-template-columns:minmax(0,1fr) var(--neo-w,380px);min-height:0;}
    .lecture-content{position:relative;overflow:hidden;padding:18px 24px;display:flex;align-items:stretch;justify-content:stretch;min-height:0;}
    /* 课件区 stage 容器（practice 满铺 · 不限 16:9） */
    .lecture-stage{position:relative;width:100%;height:100%;background:var(--bg-card);border:1px solid var(--hairline);border-radius:14px;box-shadow:var(--shadow-card);overflow:hidden;display:flex;flex-direction:column;}
    [data-theme="dark"] .lecture-stage{background:var(--bg-card-solid);}
    /* === View panels === */
    .view-panel{position:absolute;inset:0;display:flex;flex-direction:column;min-height:0;background:var(--bg-card);}
    [data-theme="dark"] .view-panel{background:var(--bg-card-solid);}

    /* ============================================================
       INTRO / REVIEW / REPORT · Markdown 渲染器（共用 .md-pane）
       ============================================================ */
    .md-pane{flex:1;overflow-y:auto;padding:36px 60px;color:var(--ink-1);font-size:14px;line-height:1.75;}
    .md-pane::-webkit-scrollbar{width:6px;}
    .md-pane::-webkit-scrollbar-thumb{background:var(--ink-5);border-radius:3px;}
    .md-pane h1{font-size:22px;font-weight:700;margin:0 0 18px 0;color:var(--ink-1);letter-spacing:-.01em;}
    .md-pane h2{font-size:15px;font-weight:600;margin:22px 0 10px 0;color:var(--ink-1);display:flex;align-items:center;gap:8px;}
    .md-pane h2::before{content:"";display:inline-block;width:3px;height:14px;background:var(--accent);border-radius:2px;}
    .md-pane h3{font-size:13px;font-weight:600;margin:14px 0 8px 0;color:var(--ink-2);}
    .md-pane p{margin:6px 0;color:var(--ink-1);}
    .md-pane ul,.md-pane ol{margin:8px 0 8px 18px;padding:0;}
    .md-pane li{margin:4px 0;color:var(--ink-1);line-height:1.65;}
    .md-pane strong{color:var(--ink-1);font-weight:600;}
    .md-pane em{color:var(--accent);font-style:normal;font-weight:500;}
    .md-pane code{background:var(--bg-soft);padding:1px 6px;border-radius:4px;font-size:12px;color:var(--accent-2);}
    [data-theme="dark"] .md-pane code{color:var(--accent);}
    .md-pane blockquote{margin:10px 0;padding:10px 14px;background:var(--bg-soft);border-left:3px solid var(--accent);border-radius:6px;color:var(--ink-2);font-size:13px;}
    .md-section{margin-bottom:18px;}
    .md-callback-row{padding:6px 12px;background:var(--bg-soft);border-radius:8px;margin:6px 0;font-size:13px;cursor:pointer;border:1px solid var(--hairline);transition:all .15s ease;display:flex;align-items:flex-start;gap:8px;}
    .md-callback-row:hover{border-color:var(--accent);background:var(--accent-soft);}
    .md-callback-row .turn-tag{flex-shrink:0;font-size:11px;color:var(--ink-3);font-feature-settings:'tnum';font-weight:600;min-width:54px;}
    .md-callback-row.warn .turn-icon{color:var(--warn);}
    .md-callback-row.star .turn-icon{color:var(--accent);}
    .md-callback-row .turn-icon{flex-shrink:0;font-size:13px;}
    .md-callback-row .turn-text{flex:1;color:var(--ink-1);font-size:12px;line-height:1.55;}

    /* ============================================================
       INTRO_VIEW (markdown · 沿用 .md-pane)
       ============================================================ */
    .intro-pane{flex:1;display:flex;flex-direction:column;min-height:0;}

    /* ============================================================
       ROLEPLAY_VIEW · 两栏子布局
       左栏 Actor 信息（头像+矩阵叠加 / H2 tabs 滚动背景）/ 右栏对话区
       v5: 信息区 +30% (300→390) / Actor 区配色与 Neo 区分
       ============================================================ */
    .roleplay-pane{flex:1;display:grid;grid-template-columns:390px 1fr;background:transparent;min-height:0;}
    /* 左栏 Actor 信息区 */
    .actor-side{grid-column:1;border-right:1px solid var(--hairline);background:var(--bg-soft);display:flex;flex-direction:column;min-height:0;position:relative;}
    [data-theme="dark"] .actor-side{background:rgba(0,0,0,0.18);}
    /* 顶部头像区 · v4 整改：满铺 / 姓名左上叠加 / 矩阵右下小窗 */
    .actor-hero{padding:0;flex-shrink:0;border-bottom:1px solid var(--hairline);position:relative;}
    /* v7.1: 去掉 overflow:hidden 避免裁掉 matrix popover；imgs 用 inset:0 + object-fit:cover 自身已不溢出 */
    .actor-hero-img-wrap{position:relative;width:100%;aspect-ratio:16/10;background:var(--bg-card);}
    /* v7: base + expr-overlay 双层 cross-fade 实现情绪切换 */
    .actor-hero-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center center;display:block;transition:opacity .35s ease;}
    .actor-hero-img.expr-overlay{opacity:0;}
    .actor-hero-img.expr-overlay.show{opacity:1;}
    /* ★ 姓名 + 身份叠在头像左上角 */
    .actor-name-overlay{position:absolute;top:10px;left:10px;z-index:4;background:rgba(0,0,0,0.55);backdrop-filter:blur(8px) saturate(160%);-webkit-backdrop-filter:blur(8px) saturate(160%);border-radius:8px;padding:6px 10px;color:#fff;}
    [data-theme="dark"] .actor-name-overlay{background:rgba(0,0,0,0.65);}
    .actor-name-overlay-name{font-size:13px;font-weight:600;line-height:1.2;}
    .actor-name-overlay-role{font-size:10px;opacity:.85;line-height:1.2;margin-top:1px;}
    /* ★ v6 矩阵小窗 · CSS radial-gradient 4 象限 + 50% 透明叠加 + hover popover 不裁 */
    /* v7: 矩阵小窗用 SVG rect + radialGradient 实现 · 中心干净纯白（与 demo 方案 C 一致） */
    .matrix-overlay{position:absolute;bottom:10px;right:10px;width:44px;height:44px;
      background:rgba(255,255,255,0.50);
      backdrop-filter:blur(10px) saturate(160%);-webkit-backdrop-filter:blur(10px) saturate(160%);
      border-radius:8px;padding:0;z-index:5;
      border:1px solid rgba(255,255,255,0.55);
      box-shadow:0 4px 14px rgba(0,0,0,0.20);
      cursor:pointer;transition:transform .15s ease,box-shadow .15s ease;
    }
    /* hover 时 actor-hero / actor-side 升层级，确保 popover 不被聊天区盖 */
    .actor-side:has(.matrix-overlay:hover){z-index:1000;}
    .actor-hero:has(.matrix-overlay:hover){z-index:1000;}
    [data-theme="dark"] .matrix-overlay{background:rgba(43,36,56,0.50);border-color:rgba(255,255,255,0.12);}
    .matrix-overlay:hover{transform:scale(1.04);box-shadow:0 6px 18px rgba(0,0,0,0.28);}
    /* SVG 圆角裁切自己（不用 matrix-overlay overflow:hidden 避免裁 popover） */
    /* v8.1: 小图透明度提高（更通透）· 大图 popover 不动 */
    .matrix-svg{width:100%;height:100%;display:block;border-radius:8px;overflow:hidden;opacity:0.62;}
    [data-theme="dark"] .matrix-svg{opacity:0.45;}
    /* hover 弹出 popover · v7: 内嵌虚线 box + 轴 + 干净渐变底 + 轴说明 */
    .matrix-popover{position:absolute;bottom:0;left:calc(100% + 8px);width:170px;background:var(--bg-card);border:1px solid var(--hairline-2);border-radius:10px;padding:10px 10px 8px 10px;box-shadow:var(--shadow-pop);opacity:0;pointer-events:none;transform:translateX(-4px);transition:all .18s ease;z-index:1000;}
    [data-theme="dark"] .matrix-popover{background:var(--bg-card-solid);}
    .matrix-overlay:hover .matrix-popover{opacity:1;pointer-events:auto;transform:translateX(0);}
    /* 内嵌虚线 box · SVG rect 实现 4 象限独立渐变到白 */
    .matrix-popover-box{position:relative;width:150px;height:150px;border-radius:10px;border:1px dashed var(--hairline-2);overflow:hidden;background:#FFFFFF;}
    [data-theme="dark"] .matrix-popover-box{background:var(--bg-card-solid);}
    /* v7.1: 大图 popover 不要透明度，干净显示 */
    .matrix-popover-svg{position:absolute;inset:0;width:100%;height:100%;display:block;opacity:1;}
    .matrix-popover-sub{font-size:10px;color:var(--ink-3);text-align:center;margin-top:6px;line-height:1.4;}
    /* popover 三角箭头 · 指向小窗 */
    .matrix-popover::after{content:"";position:absolute;right:100%;bottom:18px;width:8px;height:8px;background:var(--bg-card);border-left:1px solid var(--hairline-2);border-bottom:1px solid var(--hairline-2);transform:translateX(50%) rotate(45deg);}
    [data-theme="dark"] .matrix-popover::after{background:var(--bg-card-solid);}
    /* ★ 滚动背景信息区（左下） · v5: H2 tabs 切换 */
    .actor-bg-tabs{display:flex;flex-wrap:nowrap;gap:2px;padding:10px 12px 0 12px;border-bottom:1px solid var(--hairline);flex-shrink:0;overflow-x:auto;scrollbar-width:none;}
    .actor-bg-tabs::-webkit-scrollbar{display:none;}
    .actor-bg-tab{flex-shrink:0;padding:5px 8px;border-radius:6px 6px 0 0;font-size:11.5px;color:var(--ink-3);cursor:pointer;background:transparent;border:none;transition:all .15s ease;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;}
    .actor-bg-tab:hover{color:var(--ink-1);background:rgba(0,0,0,0.04);}
    [data-theme="dark"] .actor-bg-tab:hover{background:rgba(255,255,255,0.06);}
    .actor-bg-tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:500;}
    .actor-bg-scroll{flex:1;overflow-y:auto;padding:12px 14px 14px 14px;min-height:0;}
    .actor-bg-scroll::-webkit-scrollbar{width:5px;}
    .actor-bg-scroll::-webkit-scrollbar-thumb{background:var(--ink-5);border-radius:3px;}
    .actor-bg-content{font-size:12px;color:var(--ink-2);line-height:1.75;}
    .actor-bg-content h3{font-size:13px;color:var(--ink-1);font-weight:600;margin:10px 0 6px 0;}
    .actor-bg-content h3:first-child{margin-top:0;}
    .actor-bg-content p{margin:6px 0;}
    .actor-bg-content ul,.actor-bg-content ol{margin:6px 0 6px 16px;padding:0;}
    .actor-bg-content li{margin:3px 0;}
    .actor-bg-content strong{color:var(--ink-1);}
    .actor-bg-content em{color:var(--accent);font-style:normal;font-weight:500;}
    /* 右栏 Actor 对话区 · v6: 方案 C（无边框 + 阴影 / 学员紫渐变）+ light 淡紫偏白底 */
    .actor-dialog{grid-column:2;display:flex;flex-direction:column;min-height:0;background:var(--actor-bg);}
    /* light: v5 还原 (灰蓝 / 不动) · dark: v6 淡紫调 */
    :root,[data-theme="light"]{
      --actor-bg:#FAF7F2;
      --actor-bubble-bg:#FFFFFF;
      --actor-bubble-border:rgba(31,26,23,0.10);
      --actor-bubble-shadow:none;
      --learner-bubble-bg:#4A7C9D;
      --learner-bubble-shadow:none;
      --learner-bubble-text:#FFFFFF;
      --learner-tag-bg:rgba(74,124,157,0.14);
      --learner-tag-color:#4A7C9D;
    }
    [data-theme="dark"]{
      --actor-bg:#2D2440;
      --actor-bubble-bg:#3A2E54;
      --actor-bubble-border:rgba(255,255,255,0.10);
      --actor-bubble-shadow:0 2px 6px rgba(0,0,0,0.30);
      --learner-bubble-bg:linear-gradient(135deg,#A78BFA 0%,#7C5BAE 100%);
      --learner-bubble-shadow:0 2px 10px rgba(124,91,174,0.36);
      --learner-bubble-text:#FFFFFF;
      --learner-tag-bg:rgba(167,139,250,0.18);
      --learner-tag-color:#C4B5FD;
    }
    .actor-dialog-head{padding:12px 18px;border-bottom:1px solid var(--hairline);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
    .actor-dialog-title{font-size:13px;color:var(--ink-1);font-weight:600;}
    .actor-dialog-title .practice-tag{display:inline-block;padding:2px 8px;background:var(--learner-tag-bg);color:var(--learner-tag-color);font-size:10px;font-weight:600;border-radius:4px;margin-left:8px;letter-spacing:.4px;}
    .actor-dialog-stream{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:14px;min-height:0;}
    .actor-dialog-stream::-webkit-scrollbar{width:6px;}
    .actor-dialog-stream::-webkit-scrollbar-thumb{background:var(--ink-5);border-radius:3px;}
    /* Actor 消息 · v5 重设计：方头像 + 名字行 + 气泡 */
    .actor-msg{display:flex;gap:8px;max-width:78%;align-items:flex-start;font-family:'Inter','PingFang SC','Microsoft YaHei',system-ui,sans-serif;}
    .actor-msg.actor{align-self:flex-start;}
    .actor-msg.learner{align-self:flex-end;flex-direction:row-reverse;}
    .actor-msg.history{opacity:.7;}
    /* 方头像 · 8px 圆角 */
    .actor-msg-avatar{flex-shrink:0;width:30px;height:30px;border-radius:8px;overflow:hidden;background:var(--bg-card);border:1px solid var(--hairline);}
    .actor-msg-avatar img{width:100%;height:100%;object-fit:cover;display:block;}
    .actor-msg-avatar.letter{display:grid;place-items:center;color:#fff;font-size:13px;font-weight:600;border:none;}
    /* 气泡列 */
    .actor-msg-col{display:flex;flex-direction:column;gap:3px;min-width:0;}
    .actor-msg.learner .actor-msg-col{align-items:flex-end;}
    .actor-msg-name{font-size:11px;color:var(--ink-3);padding:0 2px;font-weight:500;}
    .actor-msg-bubble{padding:10px 14px;border-radius:12px;font-size:13.5px;line-height:1.6;word-wrap:break-word;}
    /* light: 白底+灰描边 (v5) · dark: 方案 C 阴影 */
    .actor-msg.actor .actor-msg-bubble{background:var(--actor-bubble-bg);border:1px solid var(--actor-bubble-border);color:var(--ink-1);border-top-left-radius:4px;box-shadow:var(--actor-bubble-shadow);}
    [data-theme="dark"] .actor-msg.actor .actor-msg-bubble{border:none;}
    /* light: 灰蓝实色 · dark: 紫渐变 */
    .actor-msg.learner .actor-msg-bubble{background:var(--learner-bubble-bg);color:var(--learner-bubble-text);border-top-right-radius:4px;box-shadow:var(--learner-bubble-shadow);}
    /* Actor 输入区 · v5: 结构对齐 Neo Chat（textarea + mic + send icon）/ 配色用 info 蓝区分 */
    .actor-input-row{padding:12px 16px 16px 16px;border-top:1px solid var(--hairline);background:var(--actor-bg);flex-shrink:0;}
    .actor-input-wrap{display:flex;gap:8px;align-items:flex-end;background:var(--actor-bubble-bg);border:1px solid var(--actor-bubble-border);border-radius:12px;padding:8px 8px 8px 12px;transition:border-color .15s ease;}
    .actor-input-wrap:focus-within{border-color:var(--learner-bubble-bg);}
    [data-theme="dark"] .actor-input-wrap{border-color:transparent;box-shadow:var(--actor-bubble-shadow);}
    [data-theme="dark"] .actor-input-wrap:focus-within{border-color:#A78BFA;}
    .actor-input-wrap.disabled{opacity:.55;cursor:not-allowed;}
    .actor-input-wrap.disabled .actor-input{cursor:not-allowed;}
    .actor-input{flex:1;border:none;background:transparent;font-size:13px;color:var(--ink-1);outline:none;font-family:inherit;line-height:1.55;padding:4px 0;resize:none;max-height:140px;min-height:44px;}
    .actor-input::placeholder{color:var(--ink-4);}
    /* 语音按钮 · 透明 + light 蓝色 hover · dark 紫色 hover */
    .actor-mic{width:32px;height:32px;border-radius:8px;background:transparent;color:var(--ink-3);border:none;cursor:pointer;display:grid;place-items:center;flex-shrink:0;}
    .actor-mic:hover{background:rgba(74,124,157,0.10);color:#4A7C9D;}
    [data-theme="dark"] .actor-mic:hover{background:rgba(167,139,250,0.16);color:#C4B5FD;}
    /* 发送按钮 · light: 灰蓝实色 · dark: 紫渐变（区别 Neo 橙）*/
    .actor-send{width:32px;height:32px;border-radius:8px;background:var(--learner-bubble-bg);color:var(--learner-bubble-text);border:none;cursor:pointer;display:grid;place-items:center;flex-shrink:0;transition:filter .15s ease;}
    [data-theme="dark"] .actor-send{box-shadow:var(--learner-bubble-shadow);}
    .actor-send:hover{filter:brightness(1.08);}
    .actor-send:disabled{background:var(--ink-5);color:var(--ink-3);box-shadow:none;cursor:not-allowed;}

    /* ============================================================
       REVIEW_VIEW · markdown
       ============================================================ */
    .review-pane{flex:1;display:flex;flex-direction:column;min-height:0;}

    /* ============================================================
       REPORT_VIEW · markdown + 雷达图 + loading skeleton
       ============================================================ */
    .report-pane{flex:1;display:flex;flex-direction:column;min-height:0;}
    .radar-wrap{display:flex;align-items:center;gap:24px;padding:8px 0 8px 0;}
    .radar-svg{width:280px;height:280px;flex-shrink:0;}
    .radar-list{flex:1;display:flex;flex-direction:column;gap:6px;}
    .radar-row{display:flex;align-items:center;gap:10px;font-size:13px;}
    .radar-label{flex:0 0 88px;color:var(--ink-2);}
    .radar-stars{flex:1;color:var(--accent);font-size:14px;letter-spacing:1px;}
    .radar-score{flex-shrink:0;font-size:12px;color:var(--ink-3);font-feature-settings:'tnum';}
    .skeleton-row{height:14px;background:linear-gradient(90deg,var(--bg-soft) 0%,var(--ink-5) 50%,var(--bg-soft) 100%);background-size:200% 100%;border-radius:4px;animation:skeletonShine 1.4s ease-in-out infinite;margin:8px 0;}
    @keyframes skeletonShine{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
    .skeleton-row.short{width:60%;}
    .skeleton-row.long{width:90%;}
    /* 报告整体 loading 等待状态 */
    .report-loading-wrap{display:flex;flex-direction:column;align-items:center;padding:36px 20px 20px 20px;}
    .report-loading-icon{margin-bottom:14px;}
    .report-loading-title{font-size:14px;font-weight:500;color:var(--ink-1);margin-bottom:4px;}
    .report-loading-sub{font-size:12px;color:var(--ink-3);margin-bottom:24px;}
    .report-loading-skel{width:100%;max-width:560px;}

    /* === Neo Chat (复用 lecture) === */
    .neo-chat{background:var(--glass-card);border-left:1px solid var(--hairline);backdrop-filter:blur(20px) saturate(150%);-webkit-backdrop-filter:blur(20px) saturate(150%);display:flex;flex-direction:column;min-height:0;position:relative;}
    .neo-resize-handle{position:absolute;left:-3px;top:0;bottom:0;width:6px;cursor:ew-resize;z-index:60;transition:background .15s ease;}
    .neo-resize-handle:hover{background:var(--accent-soft);}
    .neo-resize-handle.dragging{background:var(--accent);}
    /* v1.4.1 · neo-bar 跟 mgthome ora-bar 完全一致 */
    .neo-bar{display:flex;align-items:center;justify-content:center;padding:9px 0 11px 0;border-bottom:1px solid var(--hairline);background:var(--bg-card-solid);flex-shrink:0;}
    .neo-bar-text{color:var(--ink-1);font-size:13px;font-weight:600;}
    .neo-hero{position:relative;padding:12px 12px 14px 12px;border-bottom:1px solid var(--hairline);background:var(--bg-card-solid);overflow:hidden;flex-shrink:0;transition:padding .28s ease,background .2s ease;}
    .neo-hero-img{width:100%;height:200px;border-radius:14px;object-fit:cover;object-position:center top;display:block;background:var(--bg-soft);transition:max-height .28s ease,opacity .2s ease,margin .28s ease,transform .4s ease;max-height:240px;animation:none;transform-origin:center center;}
    @keyframes neoBreathe{0%,100%{transform:scale(1);box-shadow:0 0 0 0 rgba(var(--accent-rgb),0);}50%{transform:scale(1.012);box-shadow:0 0 14px 2px rgba(var(--accent-rgb),0.55);}}
    .neo-chat.speaking .neo-hero-img{animation:neoBreathe 2.4s ease-in-out infinite;}
    .neo-chat.collapsed .neo-hero-img{animation:none;max-height:0;opacity:0;margin-bottom:0;}
    .neo-hero-name{position:absolute;left:28px;bottom:30px;color:#fff;font-size:18px;font-weight:600;text-shadow:0 2px 8px rgba(0,0,0,0.5);transition:all .28s ease;pointer-events:none;}
    .neo-chat.collapsed .neo-hero{padding:0 12px;}
    .neo-chat.collapsed .neo-hero-name{position:relative;left:auto;bottom:auto;color:var(--ink-1);text-shadow:none;font-size:13px;font-weight:600;padding:9px 0 11px 0;display:block;text-align:center;pointer-events:auto;}
    .neo-collapse-btn{align-self:center;width:44px;height:22px;border-radius:11px;background:var(--bg-card-solid);border:1px solid var(--hairline-2);border-top-color:var(--hairline-top);color:var(--ink-2);cursor:pointer;display:grid;place-items:center;z-index:12;box-shadow:0 2px 8px rgba(0,0,0,0.06);transition:all .2s ease;margin:-11px 0 0 0;flex-shrink:0;}
    .neo-collapse-btn:hover{background:var(--bg-soft);color:var(--ink-1);border-color:var(--accent);}
    .neo-collapse-btn svg{transition:transform .28s ease;}
    .neo-chat.collapsed .neo-collapse-btn svg{transform:rotate(180deg);}
    .neo-stream{overflow-y:auto;padding:24px 16px 8px 16px;display:flex;flex-direction:column;gap:12px;flex:1;min-height:0;}
    .neo-stream::-webkit-scrollbar{width:6px;}
    .neo-stream::-webkit-scrollbar-thumb{background:var(--ink-5);border-radius:3px;}
    .msg{display:flex;gap:8px;max-width:100%;}
    .msg.neo{align-self:flex-start;}
    .msg.user{flex-direction:row-reverse;align-self:flex-end;}
    .msg-avatar{flex-shrink:0;width:28px;height:28px;border-radius:50%;overflow:hidden;}
    .msg-avatar img{width:100%;height:100%;object-fit:cover;}
    .msg-avatar.user-letter{display:grid;place-items:center;color:#fff;font-size:12px;font-weight:600;}
    .msg-body{display:flex;flex-direction:column;gap:6px;}
    .msg.user .msg-body{align-items:flex-end;}
    .msg-bubble{padding:10px 12px;border-radius:12px;font-size:13px;line-height:1.5;max-width:280px;word-wrap:break-word;}
    .msg.neo .msg-bubble{background:var(--bg-soft);color:var(--ink-1);border-top-left-radius:4px;}
    .msg.user .msg-bubble{background:var(--accent);color:#fff;border-top-right-radius:4px;}
    [data-theme="dark"] .msg.user .msg-bubble{background:var(--grad-cta);color:#fff;}
    .msg-bubble .speech-chip{display:inline-block;padding:1px 7px;font-size:9px;font-weight:600;border-radius:4px;letter-spacing:.5px;margin:0 0 6px 0;}
    .speech-chip.lecture{background:var(--ink-5);color:var(--ink-2);}
    .speech-chip.qa{background:var(--accent-soft);color:var(--accent);}
    .speech-chip.coach{background:rgba(167,139,250,0.20);color:#7C3AED;}
    [data-theme="dark"] .speech-chip.coach{color:var(--accent);}
    .msg-actions{display:flex;gap:4px;margin-top:0;}
    .msg-action{width:24px;height:24px;display:grid;place-items:center;color:var(--ink-4);cursor:pointer;border-radius:6px;background:transparent;border:none;transition:all .15s ease;}
    .msg-action:hover{color:var(--ink-2);background:var(--bg-soft);}
    .msg-action.active{color:var(--accent);}
    /* Neo chip · 跨场域记忆 / 系统提示 */
    .neo-chip-card{align-self:flex-start;margin-left:36px;background:var(--bg-card);border:1px solid var(--accent-soft);border-radius:10px;padding:9px 12px;font-size:12px;color:var(--ink-1);line-height:1.55;display:flex;flex-direction:column;gap:3px;max-width:300px;}
    .neo-chip-card-head{font-size:10px;font-weight:600;color:var(--accent);letter-spacing:.4px;display:flex;align-items:center;gap:4px;}
    .neo-chip-card.review-jump{border-color:rgba(167,139,250,0.40);}
    .neo-chip-card.review-jump .neo-chip-card-head{color:#7C3AED;}
    [data-theme="dark"] .neo-chip-card.review-jump .neo-chip-card-head{color:var(--accent);}

    /* === Neo Card 卡片（复用 lecture · 高光卡 + 任务卡） === */
    .neo-card{align-self:flex-start;background:var(--bg-card);border:1px solid var(--accent-soft);border-radius:12px;padding:12px;margin-left:36px;max-width:300px;width:100%;box-shadow:var(--shadow-card);}
    .neo-card-tag{display:inline-block;padding:2px 8px;background:var(--accent-soft);color:var(--accent);font-size:10px;font-weight:600;border-radius:4px;margin-bottom:8px;}
    .neo-card-title{font-size:13px;font-weight:600;color:var(--ink-1);margin-bottom:4px;}
    .neo-card-body{font-size:12px;color:var(--ink-2);line-height:1.5;margin-bottom:10px;}
    .neo-card-quote{padding:8px 12px;background:var(--bg-soft);border-left:2px solid var(--accent);border-radius:4px;font-size:12px;font-style:italic;color:var(--ink-1);margin:8px 0;}
    .neo-card-neo-note{font-size:11px;color:var(--ink-3);line-height:1.55;margin-bottom:10px;}
    .neo-card-neo-note::before{content:"Neo · ";color:var(--accent);font-weight:600;}
    .neo-card-meta{font-size:10px;color:var(--ink-4);margin-bottom:8px;letter-spacing:.3px;}
    .neo-card.highlight-card{border-color:rgba(216,155,59,0.40);}
    .neo-card.highlight-card .neo-card-tag{background:rgba(216,155,59,0.18);color:var(--warn);}
    .neo-card-actions{display:flex;gap:8px;}
    .neo-card-btn{flex:1;padding:6px 10px;border-radius:8px;font-size:12px;cursor:pointer;border:1px solid var(--hairline);background:var(--bg-cream);color:var(--ink-2);transition:all .15s ease;}
    .neo-card-btn:hover{background:var(--bg-soft);}
    .neo-card-btn.primary{background:var(--grad-cta);color:#fff;border-color:transparent;box-shadow:var(--glow-accent-2);}
    .neo-card-btn.primary:hover{filter:brightness(1.08);}
    .neo-card.collected{opacity:.55;transition:opacity .3s ease;}
    .neo-card.collected .neo-card-actions{display:none;}
    .neo-card.collected::after{content:"✓ 已加入我的高光";display:block;margin-top:4px;font-size:11px;color:var(--success);font-weight:500;}
    .highlight-flying{position:fixed;z-index:999;pointer-events:none;transition:all .65s cubic-bezier(.55,0,.55,1);}

    /* Neo input row */
    .neo-input-row{padding:12px 16px 16px 16px;border-top:1px solid var(--hairline);background:var(--bg-card);}
    .neo-input-wrap{display:flex;gap:8px;align-items:flex-end;background:var(--bg-soft);border:1px solid var(--hairline);border-radius:12px;padding:8px 8px 8px 12px;transition:border-color .15s ease;}
    .neo-input-wrap:focus-within{border-color:var(--accent);}
    .neo-input{flex:1;resize:none;border:none;background:transparent;font-size:13px;color:var(--ink-1);outline:none;max-height:140px;min-height:44px;line-height:1.55;padding:4px 0;font-family:inherit;}
    .neo-input::placeholder{color:var(--ink-4);}
    .neo-btn-icon{width:32px;height:32px;border-radius:8px;border:none;background:transparent;color:var(--ink-3);cursor:pointer;display:grid;place-items:center;}
    .neo-btn-icon:hover{background:var(--bg-cream);color:var(--ink-1);}
    .neo-btn-send{background:var(--grad-cta);color:#fff;box-shadow:var(--glow-accent-2);}
    .neo-btn-send:hover{filter:brightness(1.08);color:#fff;}
    .ai-safety-note{display:flex;align-items:center;gap:6px;padding:8px 4px 0 4px;font-size:11px;color:var(--ink-3);opacity:.65;}
    .ai-safety-note svg{stroke:currentColor;flex-shrink:0;}

    /* === Topbar dropdowns (复用 lecture) === */
    .icon-btn{position:relative;width:36px;height:36px;border-radius:10px;display:grid;place-items:center;cursor:pointer;color:var(--ink-2);transition:background .15s ease;border:none;background:transparent;}
    .icon-btn:hover{background:var(--bg-soft);color:var(--ink-1);}
    .badge{position:absolute;top:6px;right:6px;min-width:16px;height:16px;padding:0 4px;background:var(--error);color:#fff;border-radius:8px;border:2px solid var(--bg-cream);font-size:9px;font-weight:700;line-height:12px;text-align:center;}
    /* v8.1: 弃用 animation 改 transition · 避免 display:none ↔ block 切换时 animation 卡在 opacity:0 */
    /* v8.2: z-index 80 → 130，确保抽屉打开时 bell/avatar 下拉浮在 mask(100) 和 drawer(110) 之上 */
    .dropdown{position:absolute;top:calc(100% + 6px);right:0;background:var(--drawer-bg);border:1px solid var(--hairline-2);border-top-color:var(--hairline-top);border-radius:14px;box-shadow:var(--shadow-pop);z-index:130;display:none;opacity:1;transform-origin:top right;}
    .dropdown.open{display:block;}
    @keyframes dropdownIn{from{opacity:0;transform:translateY(-6px) scale(.98);}to{opacity:1;transform:translateY(0) scale(1);}}
    .bell-dropdown{width:380px;max-height:440px;overflow:hidden;}
    .dropdown.open.bell-dropdown{display:flex;flex-direction:column;}
    .dropdown-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--hairline);}
    .dropdown-title{font-size:14px;font-weight:600;color:var(--ink-1);}
    .dropdown-action{font-size:12px;color:var(--ink-3);cursor:pointer;}
    .dropdown-action:hover{color:var(--accent);}
    .msg-list{overflow-y:auto;flex:1;}
    .msg-list::-webkit-scrollbar{width:6px;}
    .msg-list::-webkit-scrollbar-thumb{background:var(--ink-5);border-radius:3px;}
    .msg-row{padding:10px 14px;border-bottom:1px solid var(--hairline);cursor:pointer;transition:background .15s ease;display:flex;gap:10px;}
    .msg-row:hover{background:var(--bg-soft);}
    .msg-row:last-child{border-bottom:none;}
    .msg-avatar-wrap{width:32px;height:32px;flex-shrink:0;border-radius:50%;display:grid;place-items:center;overflow:hidden;}
    .msg-avatar-wrap.platform{background:var(--bg-soft);padding:4px;}
    .msg-avatar-wrap.platform img{width:100%;height:100%;object-fit:contain;}
    .msg-avatar-wrap.system{background:rgba(74,124,157,0.12);color:var(--info);}
    .msg-avatar-wrap.user{color:#fff;font-size:12px;font-weight:600;}
    .msg-content{flex:1;min-width:0;}
    .msg-head{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
    .msg-text{font-size:13px;font-weight:500;color:var(--ink-1);flex:1;min-width:0;}
    .msg-dot-unread{display:inline-block;width:6px;height:6px;background:var(--accent);border-radius:50%;flex-shrink:0;}
    .msg-desc{font-size:11px;color:var(--ink-3);line-height:1.6;max-height:0;overflow:hidden;transition:max-height .25s ease,margin .25s ease;}
    .msg-row.expanded .msg-desc{max-height:200px;margin-top:6px;}
    .msg-time{font-size:10px;color:var(--ink-4);margin-top:4px;font-feature-settings:'tnum';}
    .msg-sender{font-size:11px;color:var(--ink-3);}
    .avatar-btn{display:flex;align-items:center;gap:8px;padding:4px 10px 4px 4px;border-radius:999px;cursor:pointer;border:1px solid var(--hairline);background:var(--bg-card);transition:background .15s ease;}
    .avatar-btn:hover{background:var(--bg-soft);}
    .avatar-circle{width:28px;height:28px;border-radius:50%;display:grid;place-items:center;color:#fff;font-size:12px;font-weight:600;}
    .avatar-name{font-size:13px;color:var(--ink-1);}
    .avatar-dropdown{width:240px;padding:8px;}
    .ad-head{padding:10px 12px 12px 12px;border-bottom:1px solid var(--hairline);margin-bottom:8px;}
    .ad-name{font-size:14px;font-weight:600;color:var(--ink-1);}
    .ad-role{font-size:11px;color:var(--ink-3);margin-top:2px;}
    .ad-item{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--ink-1);transition:background .15s ease;}
    .ad-item:hover{background:var(--bg-soft);}
    .ad-item-left{display:flex;align-items:center;gap:10px;}
    .ad-divider{height:1px;background:var(--hairline);margin:6px 0;}
    .ad-item.danger{color:var(--error);}

    /* === Settings drawer (复用 lecture) === */
    .drawer-mask{position:fixed;inset:0;background:rgba(31,26,23,0.32);z-index:100;display:none;animation:fadeIn .2s ease;}
    [data-theme="dark"] .drawer-mask{background:rgba(0,0,0,0.55);}
    .drawer-mask.open{display:block;}
    @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
    .drawer-right{position:fixed;top:0;right:0;bottom:0;width:420px;background:var(--drawer-bg);box-shadow:var(--shadow-pop);z-index:110;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s ease;}
    .drawer-mask.open + .drawer-right,.drawer-right.open{transform:translateX(0);}
    .drawer-close{position:absolute;top:14px;right:14px;width:28px;height:28px;border-radius:8px;border:none;background:transparent;color:var(--ink-3);cursor:pointer;font-size:18px;line-height:1;}
    .drawer-close:hover{background:var(--bg-soft);color:var(--ink-1);}
    .drawer-head{padding:18px 20px;border-bottom:1px solid var(--hairline);}
    .drawer-title{font-size:16px;font-weight:600;color:var(--ink-1);}
    .drawer-sub{font-size:11px;color:var(--ink-3);margin-top:2px;}
    .drawer-body{flex:1;overflow-y:auto;padding:18px 20px;}
    .settings-section{margin-bottom:22px;}
    .settings-section-title{font-size:12px;font-weight:600;color:var(--ink-2);margin-bottom:10px;letter-spacing:.4px;text-transform:uppercase;}
    .settings-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;}
    .settings-label{font-size:13px;color:var(--ink-1);}
    .settings-options{display:flex;gap:6px;}
    .opt-btn{padding:5px 12px;background:var(--bg-soft);border:1px solid var(--hairline);border-radius:8px;font-size:12px;color:var(--ink-2);cursor:pointer;transition:all .15s ease;}
    .opt-btn:hover{background:var(--bg-card);}
    .opt-btn.active{background:var(--accent-soft);border-color:var(--accent);color:var(--accent);font-weight:500;}

    /* === Lecture drawer (左侧覆盖式 · 复用) === */
    .lecture-drawer-mask{position:fixed;top:112px;left:0;right:var(--neo-w,380px);bottom:0;background:rgba(31,26,23,0.32);z-index:100;display:none;animation:fadeIn .2s ease;}
    [data-theme="dark"] .lecture-drawer-mask{background:rgba(0,0,0,0.55);}
    .lecture-drawer-mask.open{display:block;}
    .lecture-drawer{position:fixed;top:112px;left:0;bottom:0;width:300px;background:rgba(255,255,255,0.78);backdrop-filter:blur(24px) saturate(160%);-webkit-backdrop-filter:blur(24px) saturate(160%);box-shadow:var(--shadow-pop);z-index:110;display:flex;flex-direction:column;transform:translateX(-100%);transition:transform .25s ease;border-top:1px solid var(--hairline);border-right:1px solid var(--hairline);}
    [data-theme="dark"] .lecture-drawer{background:rgba(43,36,56,0.78);}
    .lecture-drawer.open{transform:translateX(0);}
    .lecture-drawer-tabs{display:flex;align-items:stretch;border-bottom:1px solid var(--hairline);position:relative;padding-right:38px;}
    .ld-tab{flex:1;padding:14px 8px;text-align:center;font-size:13px;color:var(--ink-3);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s ease;}
    .ld-tab:hover{color:var(--ink-1);background:rgba(0,0,0,0.04);}
    [data-theme="dark"] .ld-tab:hover{background:rgba(255,255,255,0.06);}
    .ld-tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600;}
    .lecture-drawer-close{position:absolute;right:6px;top:50%;transform:translateY(-50%);width:28px;height:28px;border-radius:8px;border:none;background:transparent;color:var(--ink-3);cursor:pointer;display:grid;place-items:center;font-size:18px;line-height:1;}
    .lecture-drawer-close:hover{background:rgba(0,0,0,0.06);color:var(--ink-1);}
    [data-theme="dark"] .lecture-drawer-close:hover{background:rgba(255,255,255,0.08);}
    .ld-panel{flex:1;overflow-y:auto;padding:12px 8px;display:none;}
    .ld-panel.active{display:block;}
    .ld-panel::-webkit-scrollbar{width:5px;}
    .ld-panel::-webkit-scrollbar-thumb{background:var(--ink-5);border-radius:3px;}
    /* Tab1 · 阶段进度（practice 4 阶段简化版） */
    .ld-phase-list{display:flex;flex-direction:column;gap:6px;padding:6px 4px;}
    .ld-phase-item{padding:12px 14px;border-radius:10px;display:flex;align-items:center;gap:10px;cursor:pointer;border:1px solid var(--hairline);background:var(--bg-card);transition:all .15s ease;}
    .ld-phase-item:hover{border-color:var(--accent);background:var(--accent-soft);}
    .ld-phase-item.locked{cursor:not-allowed;opacity:.55;}
    .ld-phase-item.locked:hover{border-color:var(--hairline);background:var(--bg-card);}
    .ld-phase-item.current{border-color:var(--accent);background:var(--accent-soft);}
    .ld-phase-icon{flex-shrink:0;width:28px;height:28px;border-radius:8px;display:grid;place-items:center;font-size:12px;font-weight:600;}
    .ld-phase-icon.completed{background:rgba(79,139,92,0.18);color:var(--success);}
    .ld-phase-icon.current{background:var(--accent);color:#fff;}
    .ld-phase-icon.locked{background:var(--bg-soft);color:var(--ink-4);}
    .ld-phase-body{flex:1;min-width:0;}
    .ld-phase-title{font-size:13px;font-weight:500;color:var(--ink-1);}
    .ld-phase-meta{font-size:11px;color:var(--ink-3);margin-top:2px;}
    /* Tab2 · Project 目录（同 lecture） */
    .ld-course{margin-bottom:6px;}
    .ld-course-head{padding:8px 12px;border-radius:8px;font-size:12px;font-weight:600;color:var(--ink-2);display:flex;align-items:center;gap:6px;cursor:pointer;transition:all .15s ease;}
    .ld-course-head:hover{background:var(--bg-soft);}
    .ld-course-head.locked{color:var(--ink-4);cursor:default;}
    .ld-course-head.locked:hover{background:transparent;}
    .ld-course-head svg.chev{transition:transform .2s ease;}
    .ld-course.collapsed .ld-course-head svg.chev{transform:rotate(-90deg);}
    .ld-course-list{padding-left:14px;display:flex;flex-direction:column;gap:2px;}
    .ld-course.collapsed .ld-course-list{display:none;}
    .ld-activity{padding:6px 10px;border-radius:6px;font-size:12px;color:var(--ink-1);display:flex;align-items:center;gap:6px;cursor:pointer;transition:all .15s ease;}
    .ld-activity:hover{background:var(--bg-soft);}
    .ld-activity.disabled{color:var(--ink-4);cursor:not-allowed;}
    .ld-activity.disabled:hover{background:transparent;}
    .ld-activity.current{background:var(--accent-soft);color:var(--accent);font-weight:500;}
    .ld-status-icon{flex-shrink:0;width:14px;height:14px;display:grid;place-items:center;}

    /* === Note float (复用 lecture) === */
    .note-float{position:fixed;left:24px;bottom:24px;width:56px;height:56px;border-radius:50%;background:var(--grad-cta);color:#fff;display:grid;place-items:center;cursor:pointer;box-shadow:var(--glow-accent-2),0 4px 16px rgba(var(--accent-rgb),0.30),0 8px 32px rgba(0,0,0,0.20);z-index:90;transition:transform .15s ease,box-shadow .15s ease;user-select:none;}
    .note-float:hover{transform:translateY(-2px);box-shadow:0 0 36px rgba(var(--accent-rgb),0.45),0 12px 28px rgba(var(--accent-rgb),0.30);}
    .note-panel{position:fixed;width:480px;max-height:70vh;background:var(--drawer-bg);border:1px solid var(--hairline-2);border-top-color:var(--hairline-top);border-radius:16px;box-shadow:var(--shadow-pop);display:none;flex-direction:column;z-index:95;animation:panelIn .18s ease;}
    @keyframes panelIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
    .note-panel.open{display:flex;}
    .note-meta{padding:12px 16px;border-bottom:1px solid var(--hairline);font-size:11px;color:var(--ink-3);display:flex;align-items:center;justify-content:space-between;}
    .note-meta-tag{padding:1px 6px;background:var(--bg-soft);border-radius:4px;color:var(--ink-2);}
    .note-body{flex:1;padding:14px 16px;font-size:14px;color:var(--ink-1);outline:none;overflow-y:auto;min-height:200px;}
    .note-body[contenteditable]:empty:before{content:attr(data-placeholder);color:var(--ink-4);}
    .note-foot{padding:10px 12px;border-top:1px solid var(--hairline);display:flex;align-items:center;justify-content:space-between;}
    .note-counter{font-size:11px;color:var(--ink-3);margin-right:8px;}
    .note-archive{padding:6px 14px;border-radius:8px;background:var(--grad-cta);color:#fff;border:none;cursor:pointer;font-size:12px;font-weight:500;box-shadow:var(--glow-accent-2);}
    .note-archive:hover{filter:brightness(1.08);}

    /* === Modal + Toast (复用 lecture) === */
    .modal-mask{position:fixed;inset:0;background:rgba(31,26,23,0.42);z-index:200;display:none;align-items:center;justify-content:center;animation:fadeIn .2s ease;}
    [data-theme="dark"] .modal-mask{background:rgba(0,0,0,0.65);}
    .modal-mask.open{display:flex;}
    .modal-card{position:relative;background:var(--bg-card);border:1px solid var(--hairline-2);border-top-color:var(--hairline-top);border-radius:16px;padding:24px 28px;max-width:480px;width:90%;box-shadow:var(--shadow-pop);animation:panelIn .2s ease;}
    /* v1.1 工程纪律 D · modal 右上角 × */
    .modal-close-x{position:absolute;top:14px;right:14px;width:28px;height:28px;border-radius:50%;border:none;background:var(--bg-soft);color:var(--ink-3);font-size:18px;line-height:1;cursor:pointer;display:grid;place-items:center;transition:all .12s;z-index:5;}
    .modal-close-x:hover{background:var(--ink-5);color:var(--ink-1);}
    /* I-V12-06: Jumper modal 内部样式（与 hall 一致 · 工程纪律 A 待抽 _shared/css/modal-common.css） */
    .modal-title{font-size:18px;font-weight:600;color:var(--ink-1);margin-bottom:8px;}
    .modal-sub{font-size:13px;color:var(--ink-3);margin-bottom:16px;}
    .modal-body{font-size:13px;color:var(--ink-2);line-height:1.7;margin-bottom:20px;}
    .modal-actions{display:flex;gap:10px;justify-content:flex-end;}
    .modal-btn{padding:8px 18px;border-radius:10px;border:1px solid var(--hairline);background:var(--bg-card);color:var(--ink-2);font-size:13px;cursor:pointer;transition:all .15s ease;}
    .modal-btn:hover{background:var(--bg-soft);}
    .modal-btn.primary{background:var(--grad-cta);color:#fff;border-color:transparent;box-shadow:var(--glow-accent-2);}
    .modal-btn.primary:hover{filter:brightness(1.08);}
    .toast{position:fixed;left:50%;top:80px;transform:translateX(-50%) translateY(-20px);padding:10px 18px;background:var(--ink-1);color:var(--bg-card);border-radius:10px;font-size:13px;opacity:0;transition:all .25s ease;z-index:300;pointer-events:none;box-shadow:var(--shadow-pop);}
    .toast.show{opacity:.95;transform:translateX(-50%) translateY(0);}
    .completion-icon{width:64px;height:64px;margin:0 auto 16px auto;border-radius:50%;background:var(--accent-soft);color:var(--accent);display:grid;place-items:center;}
    .completion-title{font-size:22px;font-weight:600;color:var(--ink-1);margin-bottom:6px;text-align:center;}
    .completion-sub{font-size:13px;color:var(--ink-3);margin-bottom:18px;text-align:center;}
    .completion-stats{display:flex;justify-content:center;gap:28px;margin-bottom:24px;font-size:12px;}
    .completion-stat-label{color:var(--ink-3);}
    .completion-stat-value{color:var(--ink-1);font-weight:600;font-size:14px;display:block;margin-top:2px;}
    .completion-actions{display:flex;flex-direction:column;gap:8px;}
    .completion-btn{padding:10px 16px;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s ease;border:1px solid var(--hairline-2);background:var(--bg-card);color:var(--ink-1);}
    .completion-btn:hover{background:var(--bg-soft);border-color:var(--accent);}
    .completion-btn.primary{background:var(--grad-cta);color:#fff;border-color:transparent;box-shadow:var(--glow-accent-2);}
    .completion-btn.primary:hover{filter:brightness(1.08);}
    .completion-btn:disabled,.completion-btn[disabled]{cursor:not-allowed;opacity:.45;background:var(--bg-soft);color:var(--ink-4);border-color:var(--hairline);box-shadow:none;}
    .completion-btn:disabled:hover,.completion-btn[disabled]:hover{background:var(--bg-soft);border-color:var(--hairline);filter:none;}
    .idle-icon{width:56px;height:56px;margin:0 auto 14px auto;border-radius:50%;background:var(--bg-soft);display:grid;place-items:center;color:var(--ink-2);}
    .idle-title{font-size:17px;font-weight:600;color:var(--ink-1);margin-bottom:6px;text-align:center;}
    .idle-sub{font-size:13px;color:var(--ink-3);margin-bottom:20px;line-height:1.6;text-align:center;}
    .idle-actions{display:flex;gap:8px;justify-content:center;}
    .idle-btn{padding:8px 22px;border-radius:10px;font-size:13px;cursor:pointer;border:1px solid var(--hairline-2);background:var(--bg-card);color:var(--ink-1);}
    .idle-btn.primary{background:var(--grad-cta);color:#fff;border-color:transparent;box-shadow:var(--glow-accent-2);}
  </style>
</head>
<body>
  <div class="stage">
    <header class="topbar">
      <!-- I-V12-03: 整个左半区（logo+chip+project）整体作为返回大厅按钮 -->
      <div class="topbar-brand" style="cursor:pointer" title="返回大厅" onclick="Router.go('hall')"><img src="assets/logo.png" alt="睿学 NeoLearning · 点击返回大厅" /></div>
      <span class="port-chip port-chip-learner" style="cursor:pointer" title="返回大厅" onclick="Router.go('hall')">学员端</span>
      <div class="topbar-project" style="cursor:pointer" title="返回大厅" onclick="Router.go('hall')">
        <span class="topbar-project-name">基层管理者培训项目</span>
        <span class="topbar-project-meta">· W6 / 26 · 第 6 周</span>
      </div>
      <div class="topbar-actions">
        <!-- bell -->
        <div style="position:relative">
          <button class="icon-btn" id="bellBtn" aria-label="消息提醒">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0112 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 003.4 0"/></svg>
            <span class="badge" id="bellBadge">3</span>
          </button>
          <div class="dropdown bell-dropdown" id="bellDropdown">
            <div class="dropdown-head">
              <span class="dropdown-title">消息提醒</span>
              <span class="dropdown-action" id="markAllRead">全部已读</span>
            </div>
            <div class="msg-list" id="msgList"></div>
          </div>
        </div>
        <!-- avatar -->
        <div style="position:relative">
          <button class="avatar-btn" id="avatarBtn">
            <span class="avatar-circle" id="avatarCircle">赵</span>
            <span class="avatar-name" id="avatarName">赵工</span>
          </button>
          <div class="dropdown avatar-dropdown" id="avatarDropdown">
            <div class="ad-head">
              <div class="ad-name" id="adName">赵工</div>
              <div class="ad-role">区域销售主管 · 学员</div>
            </div>
            <div class="ad-item" id="openSettings">
              <span class="ad-item-left">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
                设置
              </span>
            </div>
            <div class="ad-item" id="openHelp">
              <span class="ad-item-left">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                帮助
              </span>
            </div>
            <!-- I-V12-07: 切换到管理端（仅多角色账号可点） -->
            <div class="ad-item" id="switchPort">
              <span class="ad-item-left">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 014-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 01-4 4H3"/></svg>
                切换到管理端
              </span>
              <span style="font-size:10px;color:var(--ink-4)">多角色</span>
            </div>
            <div class="ad-divider"></div>
            <div class="ad-item danger" id="logoutBtn">
              <span class="ad-item-left">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                退出登录
              </span>
            </div>
          </div>
        </div>
      </div>
    </header>
    <!-- MAIN ROW · 复用 lecture 两栏 -->
    <div class="main-row">
      <div class="lecture-col">
        <header class="subbar">
          <div class="subbar-left">
            <button class="subbar-drawer-btn" id="lectureDrawerBtn" aria-label="打开课程目录">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
            <span class="subbar-activity" id="subbarActivity">重构被动型员工 · 对练</span>
            <span class="subbar-activity-meta" id="subbarActivityMeta">· 导入</span>
          </div>
          <div class="subbar-progress">
            <div class="subbar-progress-track" id="subbarProgressTrack">
              <div class="subbar-progress-fill" id="subbarProgressFill"></div>
              <div class="subbar-progress-current" id="subbarProgressCurrent"></div>
            </div>
            <span class="subbar-progress-label" id="subbarProgressLabel"></span>
          </div>
          <!-- 「重新演练 ▾」按钮 · 首次禁用 / 走完后启用 -->
          <div class="replay-wrap" id="replayWrap">
            <div class="replay-btn" id="replayBtn">
              <span class="replay-main" id="replayMain" title="新开一轮演练">重新演练</span>
              <span class="replay-arrow" id="replayArrow" title="切换历史演练">
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
              </span>
            </div>
            <div class="replay-menu" id="replayMenu"></div>
          </div>
          <div class="subbar-timer" id="subbarTimer">
            <span class="subbar-timer-dot"></span>
            <span id="subbarTimerText">00:00</span>
          </div>
        </header>
        <main class="lecture-content" id="lectureContent">
          <div class="lecture-stage" id="lectureStage">

            <!-- ① INTRO_VIEW · Markdown 渲染器 -->
            <div class="view-panel" data-view="intro" id="viewIntro">
              <div class="md-pane" id="introPane"></div>
            </div>

            <!-- ② ROLEPLAY_VIEW · 两栏子布局（左 Actor 信息 / 右对话区） -->
            <div class="view-panel" data-view="roleplay" id="viewRoleplay" style="display:none">
              <div class="roleplay-pane" id="roleplayPane">
                <!-- 左栏 · Actor 信息（顶部头像 [+ 矩阵右上角叠加] / 底部滚动背景） -->
                <div class="actor-side">
                  <div class="actor-hero">
                    <div class="actor-hero-img-wrap">
                      <img src="assets/actor-peace.png" alt="Actor base" class="actor-hero-img" id="actorHeroBase" />
                      <img src="assets/actor-angry.png" alt="Actor expression" class="actor-hero-img expr-overlay" id="actorHeroExpr" />
                      <!-- ★ 姓名身份叠加左上角 -->
                      <div class="actor-name-overlay">
                        <div class="actor-name-overlay-name" id="actorHeroName">崔德莫</div>
                        <div class="actor-name-overlay-role" id="actorHeroRole">设计部资深设计师</div>
                      </div>
                      <!-- ★ v7 状态矩阵小窗 · SVG rect 4 象限独立渐变（与 demo 方案 C 一致 · 中心纯白）-->
                      <div class="matrix-overlay" id="matrixOverlay">
                        <svg class="matrix-svg" id="matrixSvg" viewBox="0 0 140 140" preserveAspectRatio="none">
                          <defs>
                            <radialGradient id="qLT" cx="0" cy="0" r="1"><stop offset="0%" stop-color="#A6C8DD"/><stop offset="100%" stop-color="#FFFFFF"/></radialGradient>
                            <radialGradient id="qRT" cx="1" cy="0" r="1"><stop offset="0%" stop-color="#E8B0B3"/><stop offset="100%" stop-color="#FFFFFF"/></radialGradient>
                            <radialGradient id="qLB" cx="0" cy="1" r="1"><stop offset="0%" stop-color="#F0DAA0"/><stop offset="100%" stop-color="#FFFFFF"/></radialGradient>
                            <radialGradient id="qRB" cx="1" cy="1" r="1"><stop offset="0%" stop-color="#BCDBB8"/><stop offset="100%" stop-color="#FFFFFF"/></radialGradient>
                          </defs>
                          <rect x="0"  y="0"  width="70" height="70" fill="url(#qLT)"/>
                          <rect x="70" y="0"  width="70" height="70" fill="url(#qRT)"/>
                          <rect x="0"  y="70" width="70" height="70" fill="url(#qLB)"/>
