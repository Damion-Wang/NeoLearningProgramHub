<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>睿学 · 登录</title>
<!-- 本页为独立演示页面 · 完全自包含 -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        base: { 900:'#07080C', 800:'#0A0B10', 700:'#0E1016', 600:'#12141C', 500:'#181B25', 400:'#1F232F', 300:'#2A2F3E' },
        ink:  { 100:'#F1F3F8', 200:'#E6E8EE', 300:'#C4C8D4', 400:'#8B92A5', 500:'#6A7085', 600:'#4A5061', 700:'#353A48' },
        cyan: { 300:'#67E8F9', 400:'#22D3EE', 500:'#06B6D4', 600:'#0891B2' },
        violet: { 300:'#C4B5FD', 400:'#A78BFA', 500:'#8B5CF6', 600:'#7C3AED' },
        amber: { 300:'#FCD34D', 400:'#F4A855', 500:'#F59E0B' },
      },
      fontFamily: {
        sans: ['Inter','-apple-system','PingFang SC','HarmonyOS Sans SC','Microsoft YaHei','sans-serif'],
        mono: ['JetBrains Mono','ui-monospace','Consolas','monospace'],
      },
      boxShadow: {
        'glow-cyan':   '0 0 24px rgba(34,211,238,0.35)',
        'glow-violet': '0 0 24px rgba(167,139,250,0.30)',
      },
      animation: {
        breathe: 'breathe 4s ease-in-out infinite',
        aurora:  'aurora 18s ease-in-out infinite',
      },
      keyframes: {
        breathe: { '0%,100%': { opacity:'0.85', filter:'brightness(1)' }, '50%': { opacity:'1', filter:'brightness(1.25)' } },
        aurora:  { '0%,100%': { transform:'translate3d(0,0,0) scale(1)' }, '50%': { transform:'translate3d(30px,-20px,0) scale(1.08)' } },
      },
    },
  },
}
</script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
html,body { height:100%; margin:0; background:#0A0B10; color:#E6E8EE; font-family:Inter,-apple-system,'PingFang SC',sans-serif; -webkit-font-smoothing:antialiased; }
::selection { background: rgba(167,139,250,0.35); color:#fff; }

.aurora-bg::before { content:''; position:fixed; inset:0; z-index:-1; pointer-events:none;
  background:
    radial-gradient(60% 45% at 12% 12%, rgba(34,211,238,0.18) 0%, transparent 60%),
    radial-gradient(55% 50% at 92% 88%, rgba(167,139,250,0.22) 0%, transparent 60%),
    radial-gradient(40% 30% at 80% 15%, rgba(244,168,85,0.10) 0%, transparent 60%),
    linear-gradient(180deg, #0A0B10 0%, #07080C 100%);
  animation: aurora 18s ease-in-out infinite;
}

.glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border:1px solid rgba(255,255,255,0.06); }

input:focus { outline:none; border-color: rgba(34,211,238,0.5); box-shadow: 0 0 0 3px rgba(34,211,238,0.12); }

.acct-tab { position:relative; transition:all 0.2s ease; }
.acct-tab.active { color:#F1F3F8; background: rgba(255,255,255,0.04); }
.acct-tab.active::after { content:''; position:absolute; left:12%; right:12%; bottom:-1px; height:2px; border-radius:2px; background:linear-gradient(90deg,#22D3EE,#A78BFA); }
</style>
</head>
<body class="aurora-bg">

<div class="h-full flex">
  <!-- Left: Brand -->
  <div class="hidden md:flex w-1/2 flex-col items-center justify-center relative overflow-hidden">
    <!-- Decorative blurs -->
    <div class="absolute w-72 h-72 rounded-full opacity-30 animate-aurora" style="background:radial-gradient(circle, rgba(34,211,238,0.4), transparent 70%); top:20%; left:10%;"></div>
    <div class="absolute w-80 h-80 rounded-full opacity-25 animate-breathe" style="background:radial-gradient(circle, rgba(167,139,250,0.4), transparent 70%); bottom:15%; right:10%;"></div>

    <!-- Logo (inline SVG, no external assets) -->
    <div class="relative z-10 flex flex-col items-center gap-6">
      <div class="w-20 h-20 rounded-2xl flex items-center justify-center" style="background: linear-gradient(135deg, #22D3EE, #A78BFA);">
        <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 3v18M3 12h18M5.636 5.636l12.728 12.728M18.364 5.636L5.636 18.364"/>
        </svg>
      </div>
      <h1 class="text-5xl font-bold tracking-tight text-ink-100">睿学</h1>
      <p class="text-ink-400 text-lg tracking-wide">AI-Native 企业培训交付平台</p>
    </div>
  </div>

  <!-- Right: Login Form -->
  <div class="w-full md:w-1/2 flex items-center justify-center px-6">
    <div class="w-full max-w-sm">
      <!-- Mobile logo -->
      <div class="md:hidden flex flex-col items-center gap-4 mb-10">
        <div class="w-16 h-16 rounded-2xl flex items-center justify-center" style="background: linear-gradient(135deg, #22D3EE, #A78BFA);">
          <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 3v18M3 12h18M5.636 5.636l12.728 12.728M18.364 5.636L5.636 18.364"/>
          </svg>
        </div>
        <h1 class="text-3xl font-bold text-ink-100">睿学</h1>
      </div>

      <!-- Form Card -->
      <div class="glass rounded-xl p-8 space-y-6">
        <!-- Username -->
        <div class="space-y-2">
          <label class="text-sm text-ink-400">用户名</label>
          <div class="relative">
            <i data-lucide="user" class="absolute left-3 top-1/2 -translate-y-1/2 text-ink-500" style="width:18px;height:18px;"></i>
            <input id="username" type="text" value="" placeholder="请输入用户名（如 student01）"
              class="w-full bg-base-600 border border-ink-700 rounded-lg py-2.5 pl-10 pr-4 text-ink-200 placeholder-ink-500 text-sm transition-all" />
          </div>
        </div>

        <!-- Password -->
        <div class="space-y-2">
          <label class="text-sm text-ink-400">密码</label>
          <div class="relative">
            <i data-lucide="lock" class="absolute left-3 top-1/2 -translate-y-1/2 text-ink-500" style="width:18px;height:18px;"></i>
            <input id="password" type="password" value="demopass" placeholder="请输入密码"
              class="w-full bg-base-600 border border-ink-700 rounded-lg py-2.5 pl-10 pr-10 text-ink-200 placeholder-ink-500 text-sm transition-all" />
            <button onclick="togglePwd()" class="absolute right-3 top-1/2 -translate-y-1/2 text-ink-500 hover:text-ink-300 transition-colors">
              <i id="eye-icon" data-lucide="eye-off" style="width:18px;height:18px;"></i>
            </button>
          </div>
        </div>

        <!-- Login Button -->
        <button onclick="doLogin()"
          class="w-full py-2.5 rounded-lg text-sm font-semibold text-white tracking-widest transition-all hover:brightness-110 active:scale-[0.98]"
          style="background: linear-gradient(135deg, #22D3EE, #A78BFA);">
          登 录
        </button>
      </div>

      <!-- Hint -->
      <p class="text-center text-[11px] text-ink-500 mt-4 leading-relaxed">
        可用账号：<span class="text-ink-300 font-mono">student01</span>（张磊·中期）<span class="mx-1">/</span><span class="text-ink-300 font-mono">newbie01</span>（李明·开营前）
      </p>

      <!-- Version -->
      <p class="text-center text-xs text-ink-500 mt-4">v0.4.0 · 内部演示版本</p>
    </div>
  </div>
</div>

<script>
lucide.createIcons();

// ---- Default state blobs ----
const ZHANGLEI_DEFAULT = {
  learner: { name:'张磊', initial:'张', department:'销售部', email:'zhanglei@a-corp.com' },
  project: { name:'A公司基层管理者发展项目', currentWeek:5, totalWeeks:16, status:'running' },
  progress: { currentCourse:'C1', currentActivity:'A3', completedActivities:['A1','A2'], percentage:28, sco:'6/12' },
  preferences: { neoAvatar:'male', aiSpeed:'standard', theme:'dark' },
  notes: [
    { id:'n1', title:'自我归因策略要点', source:'A3·授课', date:'4/20', content:'自我归因的核心是管理者先承认自己的不足或困惑，而不是直接指出下属的问题，从而建立心理安全。' },
    { id:'n2', title:'赵工案例反思', source:'A4·对练', date:'4/19', content:'第4轮用了自我归因策略，赵工终于放下防御，说出了真实的想法。' }
  ],
  discoveries: [
    { id:'d1', title:'首次主动提问意识', source:'A1·授课', date:'4/15' },
    { id:'d2', title:'对练中的情绪感知', source:'A4·对练', date:'4/18' },
    { id:'d3', title:'自我归因突破', source:'A4·对练', date:'4/20' }
  ],
  tools: [
    { id:'t1', name:'GROW 辅导对话模板', unlocked:true },
    { id:'t2', name:'心理安全对话清单', unlocked:false }
  ],
  bellNotifications: [
    { id:'b1', type:'运营', title:'本周五前完成 Course 2 可获优先选座权', time:'昨天09:12', unread:true },
    { id:'b2', type:'催学', title:'你已连续2天未学习', time:'今天08:30', unread:true },
    { id:'b3', type:'平台', title:'AI 教练已更新', time:'4/18', unread:false }
  ],
  portRole: 'learner'
};

const NEWBIE_DEFAULT = {
  learner: { name:'李明', initial:'李', department:'市场部', email:'liming@a-corp.com' },
  project: { name:'A公司基层管理者发展项目', currentWeek:0, totalWeeks:16, status:'pre-launch' },
  progress: { currentCourse:null, currentActivity:null, completedActivities:[], percentage:0, sco:'0/12' },
  preferences: { neoAvatar:'male', aiSpeed:'standard', theme:'dark' },
  notes: [],
  discoveries: [],
  tools: [ { id:'t1', name:'GROW 辅导对话模板', unlocked:false } ],
  bellNotifications: [
    { id:'b1', type:'运营', title:'欢迎加入 A公司基层管理者发展项目', time:'今天08:00', unread:true }
  ],
  portRole: 'learner'
};

function togglePwd() {
  const inp = document.getElementById('password');
  const icon = document.getElementById('eye-icon');
  const show = inp.type === 'password';
  inp.type = show ? 'text' : 'password';
  icon.setAttribute('data-lucide', show ? 'eye' : 'eye-off');
  lucide.createIcons();
}

function doLogin() {
  const username = document.getElementById('username').value.trim();
  let account;
  if (username === 'student01') account = 'zhanglei';
  else if (username === 'newbie01') account = 'newbie';
  else { alert('用户名错误，请输入 student01 或 newbie01'); return; }
  localStorage.setItem('srxCurrentAccount', account);
  const key = 'srxDemoState_' + account;
  // Only initialize state if not already present (preserve user's learning progress)
  if (!localStorage.getItem(key)) {
    const defaultState = account === 'zhanglei' ? ZHANGLEI_DEFAULT : NEWBIE_DEFAULT;
    localStorage.setItem(key, JSON.stringify(defaultState));
  }
  if (account === 'zhanglei') {
    window.location.href = '02-hall-mid.html';
  } else {
    window.location.href = '02-hall-new.html';
  }
}

document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});
</script>
</body>
</html>
