<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>消息中心 Message · 睿学 NeoLearning</title>
  <script src="_shared/js/demo-reset.js?v=18"></script>
  <link rel="stylesheet" href="_shared/fonts/inter.css" />
  <link rel="stylesheet" href="_shared/css/tokens.css?v=14" />
  <link rel="stylesheet" href="_shared/css/topbar.css?v=15" />
  <style>
    /* ============================================================
       Tokens · 与 proconfig / mgthome / hall 完全对齐（双模式）
       ============================================================ */
    :root,
    [data-theme="light"] {
      --bg-app:        #FAF7F2;
      --bg-cream:      #FAF7F2;
      --bg-card:       #FFFFFF;
      --bg-card-solid: #FFFFFF;
      --glass-card:    rgba(255,255,255,0.62);
      --bg-soft:       #F5F1EA;
      --bg-glow-1:     rgba(217,119,87,0.22);
      --bg-glow-2:     rgba(184,95,56,0.16);
      --bg-glow-3:     rgba(245,184,149,0.14);
      --ink-1: #1F1A17; --ink-2: #5C544E; --ink-3: #8E867F; --ink-4: #C4BCB4; --ink-5: #E5DFD7;
      --accent: #D97757; --accent-rgb: 217,119,87;
      --accent-hover: #C8694B; --accent-soft: #F5E5DC;
      --accent-2: #B85F38; --accent-2-rgb: 184,95,56;
      --emerald: #10B981; --info: #4A7C9D; --warn: #D89B3B;
      --error: #C0392B; --success: #4F8B5C;
      --grad-brand: linear-gradient(135deg, #D97757 0%, #B85F38 100%);
      --grad-cta:   linear-gradient(135deg, #D97757 0%, #B85F38 100%);
      --drawer-bg:  #FFFFFF;
      --hairline: rgba(31,26,23,0.08);
      --hairline-2: rgba(31,26,23,0.14);
      --hairline-top: rgba(255,255,255,0.85);
      --shadow-card: 0 1px 2px rgba(31,26,23,0.04), 0 4px 16px rgba(31,26,23,0.04);
      --shadow-pop: 0 4px 12px rgba(31,26,23,0.06), 0 16px 48px rgba(31,26,23,0.08);
      --inset-highlight: rgba(255,255,255,0.6);
      --glow-accent: 0 0 24px rgba(var(--accent-rgb),0.18);
      --glow-accent-2: 0 0 24px rgba(var(--accent-2-rgb),0.16);
      --radius: 12px; --topbar-h: 56px;
    }
    [data-theme="dark"] {
      --bg-app: #221C2D; --bg-cream: #221C2D; --bg-card: #2B2438;
      --bg-card-solid: #2B2438; --glass-card: rgba(255,255,255,0.05);
      --bg-soft: #322940;
      --bg-glow-1: rgba(167,139,250,0.32); --bg-glow-2: rgba(139,92,246,0.24);
      --bg-glow-3: rgba(196,181,253,0.16); --bg-glow-4: rgba(91,46,205,0.20);
      --ink-1: rgba(243,239,250,0.96); --ink-2: rgba(243,239,250,0.72);
      --ink-3: rgba(243,239,250,0.46); --ink-4: rgba(243,239,250,0.28); --ink-5: rgba(243,239,250,0.16);
      --accent: #C4B5FD; --accent-rgb: 196,181,253;
      --accent-hover: #DDD6FE; --accent-soft: rgba(196,181,253,0.14);
      --accent-2: #A78BFA; --accent-2-rgb: 167,139,250;
      --error: #F87171; --warn: #FBBF24; --success: #34D399; --info: #60A5FA;
      --grad-brand: linear-gradient(135deg, #C4B5FD 0%, #A78BFA 100%);
      --grad-cta:   linear-gradient(135deg, #A78BFA 0%, #7C3AED 100%);
      --drawer-bg: #2B2438;
      --hairline: rgba(255,255,255,0.08); --hairline-2: rgba(255,255,255,0.14);
      --hairline-top: rgba(255,255,255,0.16);
      --shadow-card: 0 8px 32px rgba(0,0,0,0.40);
      --shadow-pop: 0 24px 60px rgba(0,0,0,0.55), 0 0 0 1px rgba(0,0,0,0.30);
      --inset-highlight: rgba(255,255,255,0.06);
      --glow-accent: 0 0 24px rgba(var(--accent-rgb),0.30);
      --glow-accent-2: 0 0 24px rgba(var(--accent-2-rgb),0.24);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
      color: var(--ink-1); font-size: 14px; line-height: 1.5; min-width: 1280px; height: 100vh; overflow: hidden;
      background:
        radial-gradient(ellipse 1100px 800px at 8% 6%, var(--bg-glow-1), transparent 55%),
        radial-gradient(ellipse 1000px 700px at 95% 90%, var(--bg-glow-2), transparent 55%),
        radial-gradient(ellipse 600px 400px at 50% 30%, var(--bg-glow-3), transparent 60%),
        var(--bg-cream);
      background-attachment: fixed;
    }
    [data-theme="dark"] body {
      background:
        radial-gradient(ellipse 1200px 900px at 8% 6%, var(--bg-glow-1), transparent 55%),
        radial-gradient(ellipse 1100px 800px at 95% 92%, var(--bg-glow-2), transparent 55%),
        radial-gradient(ellipse 700px 500px at 50% 35%, var(--bg-glow-3), transparent 60%),
        radial-gradient(ellipse 1400px 1000px at 50% 100%, var(--bg-glow-4), transparent 65%),
        linear-gradient(180deg, #2C2440 0%, #221C2D 50%, #1A1525 100%);
      background-attachment: fixed;
    }
    button, input, textarea, select { font-family: inherit; font-size: inherit; color: inherit; }

    /* === Stage / Topbar / Sidenav / Subbar / Main · 沿用 proconfig === */
    .stage { display: grid; grid-template-rows: var(--topbar-h) auto 1fr; height: 100vh; width: 100%; }
    .topbar { display: grid; grid-template-columns: 64px auto 1fr auto; align-items: center; background: transparent; border-bottom: 1px solid var(--hairline); padding-right: 16px; }
    .port-chip { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; letter-spacing: 0.02em; margin-left: 8px; flex-shrink: 0; border: 1px solid currentColor; background: transparent; }
    .port-chip-admin { color: #10B981; }
    [data-theme="dark"] .port-chip-admin { color: #6EE7B7; }
    .topbar-brand { display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .topbar-brand img { width: 28px; height: 28px; object-fit: contain; filter: drop-shadow(0 0 12px rgba(var(--accent-rgb),0.25)); }
    .topbar-project { display: flex; align-items: center; gap: 10px; padding-left: 8px; }
    .topbar-project-name { font-size: 14px; font-weight: 600; color: var(--ink-1); }
    .topbar-project-meta { font-size: 12px; color: var(--ink-3); }
    .topbar-actions { display: flex; align-items: center; gap: 4px; }
    .main-row { display: grid; grid-template-columns: 64px minmax(0, 1fr); min-height: 0; }
    .left-nav { background: transparent; display: flex; align-items: center; justify-content: center; }
    .nav-pill { background: var(--bg-card-solid); border: 1px solid var(--hairline); border-radius: 18px; padding: 6px; display: flex; flex-direction: column; gap: 4px; box-shadow: 0 2px 6px rgba(31,26,23,0.04), 0 8px 24px rgba(31,26,23,0.04); }
    .nav-item { width: 40px; height: 40px; border-radius: 12px; display: grid; place-items: center; color: var(--ink-3); cursor: pointer; transition: all 0.15s ease; position: relative; }
    .nav-item:hover { background: var(--bg-soft); color: var(--ink-1); }
    .nav-item.active { background: var(--grad-cta); color: #fff; box-shadow: var(--glow-accent-2), inset 0 1px 0 rgba(255,255,255,0.20); }
    .nav-item.disabled { color: var(--ink-4); cursor: not-allowed; }
    .nav-tooltip { position: absolute; left: 50px; top: 50%; transform: translateY(-50%); background: var(--ink-1); color: #fff; padding: 4px 10px; border-radius: 6px; font-size: 12px; white-space: nowrap; opacity: 0; pointer-events: none; transition: opacity 0.15s ease; z-index: 60; }
    [data-theme="dark"] .nav-tooltip { background: var(--bg-card); color: var(--ink-1); border: 1px solid var(--hairline-2); }
    .nav-item:hover .nav-tooltip { opacity: 1; }
    .main { padding: 0; overflow-y: auto; overflow-x: hidden; position: relative; }
    .main::-webkit-scrollbar { width: 8px; }
    .main::-webkit-scrollbar-thumb { background: var(--ink-5); border-radius: 4px; }
    .main-inner { max-width: 1280px; margin: 0 auto; padding: 16px 24px 80px; }

    /* === Topbar · bell + avatar dropdown 沿用 proconfig === */
    .icon-btn { position: relative; width: 36px; height: 36px; border-radius: 10px; display: grid; place-items: center; cursor: pointer; color: var(--ink-2); transition: background 0.15s ease; border: none; background: transparent; }
    .icon-btn:hover { background: var(--bg-soft); color: var(--ink-1); }
    .badge { position: absolute; top: 6px; right: 6px; min-width: 16px; height: 16px; padding: 0 4px; background: var(--error); color: #fff; border-radius: 8px; border: 2px solid var(--bg-cream); font-size: 9px; font-weight: 700; line-height: 12px; text-align: center; }
    .dropdown { position: absolute; top: calc(100% + 6px); right: 0; background: var(--drawer-bg); border: 1px solid var(--hairline-2); border-top-color: var(--hairline-top); border-radius: 14px; box-shadow: var(--shadow-pop); z-index: 80; display: none; animation: dropdownIn 0.15s ease; transform-origin: top right; }
    .dropdown.open { display: block; }
    @keyframes dropdownIn { from { opacity: 0; transform: translateY(-6px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
    .bell-dropdown { width: 380px; max-height: 440px; overflow: hidden; }
    .dropdown.open.bell-dropdown { display: flex; flex-direction: column; }
    .dropdown-head { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid var(--hairline); }
    .dropdown-title { font-size: 14px; font-weight: 600; color: var(--ink-1); }
    .dropdown-action { font-size: 12px; color: var(--ink-3); cursor: pointer; }
    .dropdown-action:hover { color: var(--accent); }
    .msg-list { overflow-y: auto; flex: 1; }
    .msg-list::-webkit-scrollbar { width: 6px; }
    .msg-list::-webkit-scrollbar-thumb { background: var(--ink-5); border-radius: 3px; }
    .msg-row { padding: 10px 14px; border-bottom: 1px solid var(--hairline); cursor: pointer; transition: background 0.15s ease; display: flex; gap: 10px; }
    .msg-row:hover { background: var(--bg-soft); }
    .msg-row:last-child { border-bottom: none; }
    .msg-avatar-wrap { width: 32px; height: 32px; flex-shrink: 0; border-radius: 50%; display: grid; place-items: center; overflow: hidden; }
    .msg-avatar-wrap.platform { background: var(--accent-soft); color: var(--accent); padding: 4px; }
    .msg-avatar-wrap.system { background: rgba(74,124,157,0.12); color: var(--info); }
    .msg-avatar-wrap.user { background: var(--grad-cta); color: #fff; font-size: 12px; font-weight: 600; }
    .msg-content { flex: 1; min-width: 0; }
    .msg-head { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .msg-text { font-size: 13px; font-weight: 500; color: var(--ink-1); flex: 1; min-width: 0; }
    .msg-dot-unread { display: inline-block; width: 6px; height: 6px; background: var(--accent); border-radius: 50%; flex-shrink: 0; }
    .msg-desc { font-size: 11px; color: var(--ink-3); line-height: 1.6; max-height: 0; overflow: hidden; transition: max-height 0.25s ease, margin 0.25s ease; }
    .msg-row.expanded .msg-desc { max-height: 200px; margin-top: 6px; }
    .msg-time { font-size: 10px; color: var(--ink-4); margin-top: 4px; font-feature-settings: 'tnum'; }
    .msg-sender { font-size: 11px; color: var(--ink-3); }
    .avatar-btn { display: flex; align-items: center; gap: 8px; padding: 4px 10px 4px 4px; border-radius: 999px; cursor: pointer; border: 1px solid var(--hairline); background: var(--bg-card); transition: background 0.15s ease; }
    .avatar-btn:hover { background: var(--bg-soft); }
    .avatar-circle { width: 28px; height: 28px; border-radius: 50%; display: grid; place-items: center; color: #fff; font-size: 12px; font-weight: 600; background: var(--grad-cta); }
    .avatar-name { font-size: 13px; color: var(--ink-1); }
    .avatar-dropdown { width: 240px; padding: 8px; }
    .ad-head { padding: 10px 12px 12px 12px; border-bottom: 1px solid var(--hairline); margin-bottom: 8px; }
    .ad-name { font-size: 14px; font-weight: 600; color: var(--ink-1); }
    .ad-role { font-size: 11px; color: var(--ink-3); margin-top: 2px; }
    .ad-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 13px; color: var(--ink-1); transition: background 0.15s ease; }
    .ad-item:hover { background: var(--bg-soft); }
    .ad-item.disabled { color: var(--ink-4); cursor: not-allowed; }
    .ad-item-left { display: flex; align-items: center; gap: 10px; }
    .ad-divider { height: 1px; background: var(--hairline); margin: 6px 0; }
    .ad-item.danger { color: var(--error); }

    /* === Settings drawer 沿用 proconfig === */
    .drawer-mask { position: fixed; inset: 0; background: rgba(31,26,23,0.32); z-index: 100; display: none; animation: fadeIn 0.2s ease; }
    .drawer-mask.open { display: block; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .drawer-right { position: fixed; top: 0; right: 0; bottom: 0; width: 420px; background: var(--drawer-bg); box-shadow: var(--shadow-pop); z-index: 110; display: flex; flex-direction: column; transform: translateX(100%); transition: transform 0.25s ease; }
    .drawer-mask.open .drawer-right { transform: translateX(0); }
    .drawer-head { padding: 18px 24px; border-bottom: 1px solid var(--hairline); }
    .drawer-title { font-size: 18px; font-weight: 600; color: var(--ink-1); margin-bottom: 4px; }
    .drawer-sub { font-size: 12px; color: var(--ink-3); }
    .drawer-close { position: absolute; top: 16px; right: 16px; width: 32px; height: 32px; border-radius: 8px; cursor: pointer; display: grid; place-items: center; color: var(--ink-3); background: transparent; border: none; font-size: 22px; line-height: 1; }
    .drawer-close:hover { background: var(--bg-soft); color: var(--ink-1); }
    .drawer-body { padding: 16px 24px; overflow-y: auto; flex: 1; }
    .settings-section { padding: 16px 0; border-bottom: 1px solid var(--hairline); }
    .settings-section:last-child { border-bottom: none; }
    .settings-section-title { font-size: 12px; font-weight: 600; color: var(--ink-3); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
    .settings-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; }
    .settings-label { font-size: 13px; color: var(--ink-1); }
    .settings-options { display: flex; gap: 6px; }
    .opt-btn { padding: 6px 12px; font-size: 12px; border-radius: 8px; cursor: pointer; border: 1px solid var(--hairline); background: var(--bg-card); color: var(--ink-2); }
    .opt-btn:hover { border-color: var(--accent); }
    .opt-btn.active { background: var(--grad-cta); color: #fff; border-color: transparent; box-shadow: var(--glow-accent-2); }

    /* === Subbar（沿用 proconfig 框架 · 内容随 view 切换） === */
    .subbar {
      background: rgba(250,247,242,0.78);
      backdrop-filter: blur(12px) saturate(160%);
      -webkit-backdrop-filter: blur(12px) saturate(160%);
      border-bottom: 1px solid var(--hairline);
      padding: 10px 24px;
      display: flex; align-items: center; gap: 14px;
    }
    [data-theme="dark"] .subbar { background: rgba(34,28,45,0.78); }
    .subbar-title { font-size: 14px; font-weight: 600; color: var(--ink-1); flex-shrink: 0; }
    .status-chip { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 600; }
    .status-chip.pre-launch { background: rgba(216,155,59,0.18); color: var(--warn); }
    .status-chip.running { background: rgba(79,139,92,0.18); color: var(--success); }
    .subbar-divider { width: 1px; height: 18px; background: var(--hairline-2); flex-shrink: 0; }
    .subbar-spacer { flex: 1; }
    .subbar-back-btn { display: inline-flex; align-items: center; gap: 6px; padding: 5px 12px; border-radius: 8px; border: 1px solid var(--hairline-2); background: var(--bg-card); color: var(--ink-2); cursor: pointer; font-size: 12px; }
    .subbar-back-btn:hover { background: var(--bg-soft); color: var(--ink-1); border-color: var(--accent); }

    /* === 玻璃 .card / .section 沿用 proconfig === */
    .section { margin-top: 16px; padding: 18px 22px; background: var(--glass-card); border: 1px solid var(--hairline); border-top-color: var(--hairline-top); border-radius: 14px; box-shadow: inset 0 1px 0 var(--inset-highlight), var(--shadow-card); backdrop-filter: blur(20px) saturate(150%); -webkit-backdrop-filter: blur(20px) saturate(150%); position: relative; }
    .section::before { content: ""; position: absolute; top: 0; left: 50%; transform: translateX(-50%); height: 1px; width: 50%; background: linear-gradient(90deg, transparent, rgba(var(--accent-rgb),0.25), transparent); pointer-events: none; opacity: 0.7; }

    /* === Modal · 沿用 proconfig === */
    .modal-mask { position: fixed; inset: 0; background: rgba(31,26,23,0.42); z-index: 200; display: none; align-items: center; justify-content: center; animation: fadeIn .2s; }
    [data-theme="dark"] .modal-mask { background: rgba(0,0,0,0.65); }
    .modal-mask.open { display: flex; }
    .modal-card { position: relative; background: var(--bg-card); border: 1px solid var(--hairline-2); border-radius: 16px; padding: 24px 28px; max-width: 480px; width: 90%; box-shadow: var(--shadow-pop); animation: panelIn .2s; max-height: 88vh; overflow-y: auto; }
    .modal-card.wide { max-width: 720px; }
    .modal-card::-webkit-scrollbar { width: 6px; }
    .modal-card::-webkit-scrollbar-thumb { background: var(--ink-5); border-radius: 3px; }
    @keyframes panelIn { from { opacity: 0; transform: translateY(8px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
    .modal-close-x { position: absolute; top: 14px; right: 14px; width: 28px; height: 28px; border-radius: 50%; border: none; background: var(--bg-soft); color: var(--ink-3); font-size: 18px; line-height: 1; cursor: pointer; display: grid; place-items: center; }
    .modal-close-x:hover { background: var(--ink-5); color: var(--ink-1); }
    .modal-title { font-size: 18px; font-weight: 600; color: var(--ink-1); margin-bottom: 8px; }
    .modal-sub { font-size: 13px; color: var(--ink-3); margin-bottom: 16px; }
    .modal-body { font-size: 13px; color: var(--ink-2); line-height: 1.7; margin-bottom: 20px; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
    .modal-btn { padding: 8px 18px; border-radius: 10px; border: 1px solid var(--hairline); background: var(--bg-card); color: var(--ink-2); font-size: 13px; cursor: pointer; }
    .modal-btn:hover { background: var(--bg-soft); }
    .modal-btn.primary { background: var(--grad-cta); color: #fff; border-color: transparent; box-shadow: var(--glow-accent-2); }
    .modal-btn.primary:hover { filter: brightness(1.08); }

    /* === Completion modal（离开拦截 · 沿用 proconfig v9） === */
    .completion-icon { width: 64px; height: 64px; margin: 0 auto 16px auto; border-radius: 50%; background: var(--accent-soft); color: var(--accent); display: grid; place-items: center; }
    .completion-title { font-size: 22px; font-weight: 600; color: var(--ink-1); margin-bottom: 6px; text-align: center; }
    .completion-sub { font-size: 13px; color: var(--ink-3); margin-bottom: 18px; text-align: center; line-height: 1.6; }
    .completion-list { background: var(--bg-soft); border-radius: 10px; padding: 10px 14px; margin-bottom: 18px; }
    .completion-list-title { font-size: 11px; color: var(--ink-3); margin-bottom: 6px; }
    .completion-list ul { margin: 0; padding-left: 18px; font-size: 13px; color: var(--ink-1); }
    .completion-actions { display: flex; flex-direction: column; gap: 8px; }
    .completion-btn { padding: 10px 16px; border-radius: 10px; font-size: 13px; font-weight: 500; cursor: pointer; transition: all .15s ease; border: 1px solid var(--hairline-2); background: var(--bg-card); color: var(--ink-1); }
    .completion-btn:hover { background: var(--bg-soft); border-color: var(--accent); }
    .completion-btn.primary { background: var(--grad-cta); color: #fff; border-color: transparent; box-shadow: var(--glow-accent-2); }
    .completion-btn.primary:hover { filter: brightness(1.08); }
    .completion-btn.danger { color: var(--error); }
    .completion-btn.danger:hover { background: rgba(192,57,43,0.08); border-color: var(--error); }

    /* === Toast === */
    .toast { position: fixed; left: 50%; top: 80px; transform: translateX(-50%) translateY(-20px); padding: 10px 18px; background: var(--ink-1); color: var(--bg-card); border-radius: 10px; font-size: 13px; opacity: 0; transition: all .25s; z-index: 300; pointer-events: none; box-shadow: var(--shadow-pop); }
    .toast.show { opacity: .95; transform: translateX(-50%) translateY(0); }
    [data-theme="dark"] .toast { background: #F1F3F8; color: #1F1A23; }

    /* ============================================================
       Message-specific 样式
       ============================================================ */

    /* Subbar 控件 · 列表态 */
    .subbar-select, .subbar-search { padding: 5px 10px; border: 1px solid var(--hairline-2); border-radius: 8px; background: var(--bg-card); color: var(--ink-1); font-size: 12px; }
    .subbar-select { cursor: pointer; }
    .subbar-search { width: 220px; }
    .subbar-search:focus, .subbar-select:focus { outline: none; border-color: var(--accent); box-shadow: var(--glow-accent-2); }
    .subbar-cta { padding: 6px 14px; border-radius: 8px; border: none; background: var(--grad-cta); color: #fff; font-size: 12px; font-weight: 500; cursor: pointer; box-shadow: var(--glow-accent-2); display: inline-flex; align-items: center; gap: 4px; }
    .subbar-cta:hover { filter: brightness(1.08); }

    /* Type chip · 4 种 */
    .type-chip { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; flex-shrink: 0; }
    .type-chip.manual { background: rgba(74,124,157,0.14); color: var(--info); }
    .type-chip.auto { background: rgba(216,155,59,0.18); color: var(--warn); }
    .type-chip.draft { background: var(--bg-soft); color: var(--ink-3); border: 1px solid var(--hairline-2); }
    .type-chip.scheduled { background: rgba(167,139,250,0.16); color: #7C3AED; }
    [data-theme="dark"] .type-chip.scheduled { background: rgba(196,181,253,0.18); color: var(--accent); }
    [data-theme="dark"] .type-chip.manual { background: rgba(96,165,250,0.18); color: #60A5FA; }
    [data-theme="dark"] .type-chip.auto { background: rgba(251,191,36,0.18); color: var(--warn); }

    /* Trigger label（自动催学子标签）*/
    .trigger-label { font-size: 10px; color: var(--ink-3); padding: 1px 6px; border-radius: 4px; background: var(--bg-soft); margin-left: 4px; }

    /* Recipients popover */
    .recipients-cell { display: inline-flex; align-items: center; gap: 4px; cursor: default; position: relative; }
    .recipients-popover { position: absolute; top: 100%; left: 0; margin-top: 4px; padding: 8px 12px; background: var(--bg-card); border: 1px solid var(--hairline-2); border-radius: 8px; box-shadow: var(--shadow-pop); font-size: 11px; line-height: 1.6; max-width: 300px; min-width: 160px; z-index: 50; opacity: 0; pointer-events: none; transition: opacity 0.15s; max-height: 200px; overflow-y: auto; }
    .recipients-cell:hover .recipients-popover { opacity: 1; pointer-events: auto; }
    .recipients-popover-name { color: var(--ink-1); padding: 2px 0; }

    /* Delivery status */
    .delivery-cell { font-size: 12px; font-feature-settings: 'tnum'; display: inline-flex; align-items: center; gap: 6px; }
    .delivery-cell.sent { color: var(--success); font-weight: 500; }
    .delivery-cell.failed { color: var(--error); font-weight: 500; }
    .delivery-cell.draft { color: var(--ink-4); }
    .delivery-cell.scheduled { color: var(--warn); }

    /* Messages table */
    .messages-table-wrap { background: var(--glass-card); border: 1px solid var(--hairline); border-top-color: var(--hairline-top); border-radius: 14px; box-shadow: inset 0 1px 0 var(--inset-highlight), var(--shadow-card); backdrop-filter: blur(20px) saturate(150%); -webkit-backdrop-filter: blur(20px) saturate(150%); overflow: hidden; }
    .messages-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .messages-table thead th { padding: 10px 12px; font-weight: 500; color: var(--ink-3); font-size: 12px; text-align: left; background: rgba(255,255,255,0.5); border-bottom: 1px solid var(--hairline); white-space: nowrap; position: sticky; top: 0; z-index: 1; }
    [data-theme="dark"] .messages-table thead th { background: rgba(255,255,255,0.04); }
    .messages-table tbody tr { border-bottom: 1px solid var(--hairline); transition: background 0.15s ease; }
    .messages-table tbody tr:hover { background: var(--bg-soft); cursor: pointer; }
    .messages-table tbody tr:last-child { border-bottom: none; }
    .messages-table tbody td { padding: 12px; color: var(--ink-2); vertical-align: top; }
    .messages-table .col-time { width: 110px; color: var(--ink-3); font-size: 12px; font-feature-settings: 'tnum'; white-space: nowrap; }
    .messages-table .col-type { width: 120px; }
    .messages-table .col-sender { width: 110px; color: var(--ink-2); }
    .messages-table .col-recip { width: 130px; }
    .messages-table .col-preview { color: var(--ink-1); }
    .messages-table .col-preview .msg-row-title { font-weight: 500; color: var(--ink-1); }
    .messages-table .col-preview .msg-row-snippet { color: var(--ink-3); font-size: 12px; margin-top: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 380px; }
    .messages-table .col-status { width: 150px; }
    .messages-table .col-actions { width: 130px; text-align: right; }
    .row-action-btn { padding: 4px 10px; border-radius: 6px; border: 1px solid var(--hairline-2); background: var(--bg-card); color: var(--ink-2); font-size: 11px; cursor: pointer; margin-left: 4px; }
    .row-action-btn:hover { border-color: var(--accent); color: var(--accent); }
    .row-action-btn.danger:hover { border-color: var(--error); color: var(--error); }
    .row-action-btn.primary { background: var(--grad-cta); color: #fff; border-color: transparent; }
    .row-action-btn.primary:hover { filter: brightness(1.08); color: #fff; }

    /* Inline detail expansion */
    .messages-table tbody tr.expanded-row + tr.detail-row { display: table-row; }
    .messages-table tbody tr.detail-row { display: none; background: var(--bg-soft); }
    .messages-table tbody tr.detail-row td { padding: 16px 20px; }
    .detail-block-title { font-size: 11px; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .detail-block-body { color: var(--ink-1); font-size: 13px; line-height: 1.7; margin-bottom: 12px; white-space: pre-wrap; }
    .detail-grid { display: grid; grid-template-columns: 1fr 320px; gap: 24px; }
    .detail-recipient-list { font-size: 12px; max-height: 220px; overflow-y: auto; }
    .detail-recipient-item { display: flex; align-items: center; justify-content: space-between; padding: 4px 0; border-bottom: 1px dashed var(--hairline); }
    .detail-recipient-item:last-child { border-bottom: none; }
    .detail-recipient-item .name { color: var(--ink-1); }
    .detail-recipient-item .read { color: var(--success); font-size: 11px; }
    .detail-recipient-item .unread { color: var(--ink-4); font-size: 11px; }
    .detail-recipient-item .failed { color: var(--error); font-size: 11px; }

    /* Pagination */
    .table-pagination { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-top: 1px solid var(--hairline); font-size: 12px; color: var(--ink-3); }
    .pagination-pages { display: flex; gap: 4px; }
    .pagination-btn { padding: 4px 10px; border-radius: 6px; border: 1px solid var(--hairline-2); background: var(--bg-card); color: var(--ink-2); font-size: 11px; cursor: pointer; }
    .pagination-btn:hover { border-color: var(--accent); color: var(--accent); }
    .pagination-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Empty + Pre-launch */
    .empty-state { padding: 80px 24px; text-align: center; }
    .empty-state-icon { width: 64px; height: 64px; margin: 0 auto 16px; border-radius: 50%; background: var(--accent-soft); color: var(--accent); display: grid; place-items: center; }
    .empty-state-title { font-size: 16px; font-weight: 600; color: var(--ink-1); margin-bottom: 6px; }
    .empty-state-sub { font-size: 13px; color: var(--ink-3); }

    /* === 编辑器 === */
    .editor-card { background: var(--glass-card); border: 1px solid var(--hairline); border-top-color: var(--hairline-top); border-radius: 14px; box-shadow: inset 0 1px 0 var(--inset-highlight), var(--shadow-card); backdrop-filter: blur(20px) saturate(150%); -webkit-backdrop-filter: blur(20px) saturate(150%); padding: 24px 28px; position: relative; max-width: 880px; margin: 16px auto; }
    .editor-card::before { content: ""; position: absolute; top: 0; left: 50%; transform: translateX(-50%); height: 1px; width: 50%; background: linear-gradient(90deg, transparent, rgba(var(--accent-rgb),0.25), transparent); pointer-events: none; opacity: 0.7; }

    .editor-form-row { padding: 14px 0; border-bottom: 1px solid var(--hairline); display: flex; gap: 16px; align-items: flex-start; }
    .editor-form-row:last-of-type { border-bottom: none; }
    .editor-form-label { width: 80px; font-size: 13px; color: var(--ink-2); font-weight: 500; flex-shrink: 0; padding-top: 4px; }
    .editor-form-label .req { color: var(--error); margin-left: 2px; }
    .editor-form-body { flex: 1; min-width: 0; }
    .editor-input { width: 100%; padding: 7px 12px; border: 1px solid var(--hairline-2); border-radius: 8px; background: var(--bg-card); color: var(--ink-1); font-size: 13px; }
    .editor-input:focus { outline: none; border-color: var(--accent); box-shadow: var(--glow-accent-2); }

    /* 收件人 chip 列表 */
    .recip-chips { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; min-height: 32px; }
    .recip-chip { display: inline-flex; align-items: center; gap: 4px; padding: 3px 4px 3px 10px; border-radius: 999px; background: var(--accent-soft); color: var(--accent-2); font-size: 12px; }
    .recip-chip-x { width: 18px; height: 18px; border-radius: 50%; border: none; background: transparent; color: var(--accent-2); cursor: pointer; display: grid; place-items: center; padding: 0; }
    .recip-chip-x:hover { background: var(--accent); color: #fff; }
    .recip-add-btn { padding: 4px 12px; border-radius: 999px; border: 1px dashed var(--hairline-2); background: transparent; color: var(--ink-3); font-size: 12px; cursor: pointer; }
    .recip-add-btn:hover { border-color: var(--accent); color: var(--accent); }
    .recip-empty { color: var(--ink-4); font-size: 12px; padding: 4px 0; }

    /* Recipient picker modal */
    .picker-search { width: 100%; padding: 8px 12px; border: 1px solid var(--hairline-2); border-radius: 8px; margin-bottom: 12px; font-size: 13px; background: var(--bg-card); color: var(--ink-1); }
    .picker-search:focus { outline: none; border-color: var(--accent); }
    .picker-toolbar { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--hairline); margin-bottom: 8px; }
    .picker-list { max-height: 360px; overflow-y: auto; padding: 4px 0; }
    .picker-list::-webkit-scrollbar { width: 5px; }
    .picker-list::-webkit-scrollbar-thumb { background: var(--ink-5); border-radius: 3px; }
    .picker-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 6px; cursor: pointer; }
    .picker-item:hover { background: var(--bg-soft); }
    .picker-item input[type="checkbox"] { cursor: pointer; }
    .picker-item-name { flex: 1; min-width: 0; font-size: 13px; color: var(--ink-1); }
    .picker-item-meta { font-size: 11px; color: var(--ink-3); }
    .picker-count { font-size: 12px; color: var(--ink-3); }

    /* 富文本工具栏 */
    .editor-toolbar { display: flex; gap: 4px; padding: 6px 8px; border: 1px solid var(--hairline-2); border-bottom: none; border-radius: 8px 8px 0 0; background: var(--bg-soft); }
    .editor-tool-btn { width: 28px; height: 28px; border-radius: 6px; border: none; background: transparent; color: var(--ink-2); cursor: pointer; display: grid; place-items: center; font-size: 12px; }
    .editor-tool-btn:hover { background: var(--bg-card); color: var(--ink-1); }
    .editor-tool-btn b { font-weight: 700; }
    .editor-tool-btn i { font-style: italic; }
    .editor-tool-btn .strike { text-decoration: line-through; }
    .editor-content { min-height: 220px; max-height: 420px; overflow-y: auto; padding: 12px 14px; border: 1px solid var(--hairline-2); border-radius: 0 0 8px 8px; background: var(--bg-card); color: var(--ink-1); font-size: 13px; line-height: 1.7; }
    .editor-content:empty:before { content: attr(data-placeholder); color: var(--ink-4); pointer-events: none; }
    .editor-content:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px rgba(var(--accent-rgb), 0.15); }
    .editor-content::-webkit-scrollbar { width: 5px; }
    .editor-content::-webkit-scrollbar-thumb { background: var(--ink-5); border-radius: 3px; }
    .editor-content a { color: var(--accent); text-decoration: underline; }
    .editor-counter { margin-top: 6px; font-size: 11px; color: var(--ink-3); display: flex; align-items: center; justify-content: space-between; font-feature-settings: 'tnum'; }
    .editor-counter.over { color: var(--error); font-weight: 600; }
    .editor-autosave { font-size: 11px; color: var(--ink-4); }

    /* 编辑器底部按钮 */
    .editor-actions { display: flex; gap: 10px; justify-content: flex-end; padding-top: 18px; border-top: 1px solid var(--hairline); margin-top: 18px; }
    .editor-btn { padding: 8px 16px; border-radius: 10px; font-size: 13px; cursor: pointer; border: 1px solid var(--hairline-2); background: var(--bg-card); color: var(--ink-1); display: inline-flex; align-items: center; gap: 6px; }
    .editor-btn:hover:not(:disabled) { background: var(--bg-soft); border-color: var(--accent); }
    .editor-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .editor-btn.primary { background: var(--grad-cta); color: #fff; border-color: transparent; box-shadow: var(--glow-accent-2); }
    .editor-btn.primary:hover:not(:disabled) { filter: brightness(1.08); }

    /* spec § 1 line 36 · 开营前 sidenav 隐藏 home/report/message · 仅留 config */
  </style>
</head>
